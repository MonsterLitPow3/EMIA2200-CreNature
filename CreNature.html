<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - HD Camera & Filters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
        }

        body {
            background: #000;
            color: #fff;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #000;
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:active {
            background: white !important;
            color: black !important;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .lang-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            cursor: pointer;
        }
        .lang-btn:active {
            background: white !important;
            color: black !important;
        }

        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .back-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .back-btn:active {
            background: white !important;
            color: black !important;
        }
        
        .shutter-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 20px);
            left: calc(50% - 40px);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.25);
            z-index: 10;
            cursor: pointer;
        }
        .shutter-btn:active {
            transform: scale(0.94);
            background: white;
        }
        
        .video-record-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 20px);
            left: calc(50% + 60px);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ff3b30;
            border: 2px solid white;
            z-index: 10;
            cursor: pointer;
        }
        .video-record-btn.recording {
            background: #ffaa00;
            transform: scale(0.92);
        }
        .video-record-btn:active {
            transform: scale(0.94);
        }

        .record-timer {
            position: absolute;
            top: max(70px, env(safe-area-inset-top) + 50px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #ff3b30;
            z-index: 10;
            display: none;
            font-family: monospace;
        }
        .record-timer.show {
            display: block;
        }

        /* 变焦控件 (拍照/录像通用) */
        .zoom-control {
            position: absolute;
            bottom: max(130px, env(safe-area-inset-bottom) + 110px);
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 20;
            transition: opacity 0.2s;
        }
        .zoom-label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 20px;
            min-width: 55px;
            text-align: center;
        }
        .zoom-slider {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            outline: none;
        }
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            border: none;
        }
        .zoom-value {
            font-size: 13px;
            font-weight: 600;
            min-width: 45px;
            text-align: right;
        }

        /* 对焦指示器 */
        .focus-indicator {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 2px solid rgba(255, 215, 0, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.1s;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
        }

        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            padding: 20px;
        }
        
        .preview-img {
            max-width: 90%;
            max-height: 55vh;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            margin-bottom: 20px;
            display: none;
        }
        
        .preview-video {
            max-width: 90%;
            max-height: 55vh;
            border-radius: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* 滤镜区域 - 只在照片模式显示，且居中布局 */
        .filter-section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .filter-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            margin: 10px 0;
        }
        .filter-scroll-container::-webkit-scrollbar {
            display: none;
        }
        .filter-track {
            display: inline-flex;
            gap: 12px;
            padding: 0 20px;
        }
        .filter-item {
            display: inline-flex;
            padding: 10px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-item.active {
            background: rgba(255,255,255,0.35);
            border: 2px solid white;
        }
        
        .glow-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 20px;
            margin: 10px auto;
            cursor: pointer;
            width: fit-content;
            justify-content: center;
        }
        .glow-toggle.active {
            background: rgba(255,255,255,0.25);
            border: 1px solid white;
        }
        
        .preview-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .preview-buttons .btn {
            width: 140px;
            padding: 12px 0;
        }
        
        .preview-wrap .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .filter-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">中文</button>

<!-- 对焦动画指示器 -->
<div class="focus-indicator" id="focusIndicator"></div>

<div class="home-wrap" id="homePage">
    <button class="btn" id="enterCameraBtn">📷 Enter Camera</button>
    <button class="btn" id="introBtn" disabled>📖 Project Intro (Soon)</button>
</div>

<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <div class="record-timer" id="recordTimer">⏺ 0.0s</div>
    <!-- 变焦控件 -->
    <div class="zoom-control" id="zoomControl" style="display: none;">
        <span class="zoom-label" id="zoomLabel">🔍 ZOOM</span>
        <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1">
        <span class="zoom-value" id="zoomValue">1.0x</span>
    </div>
    <button class="back-btn" id="backHomeBtn">← Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
    <button class="video-record-btn" id="videoRecordBtn">🎥</button>
</div>

<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview">
    <video class="preview-video" id="previewVideo" controls></video>
    <div class="filter-badge" id="filterBadge">Original</div>
    
    <!-- 滤镜区域 - 只在照片时显示 -->
    <div class="filter-section" id="filterSection">
        <div class="filter-scroll-container" id="filterScroll">
            <div class="filter-track" id="filterTrack"></div>
        </div>
        <div class="glow-toggle" id="glowToggle">
            <span>✨</span>
            <span id="glowLabel">Glow Mode</span>
        </div>
    </div>
    
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake</button>
        <button class="btn" id="downloadBtn">Download</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">← Back</button>
</div>

<canvas id="captureCanvas" style="display: none;"></canvas>

<script>
// ==================== 國際化 (英文 & 繁體中文) ====================
const i18n = {
    en: {
        enterCamera: "📷 Enter Camera",
        intro: "📖 Project Intro (Soon)",
        back: "← Back",
        retake: "Retake",
        download: "Download",
        filters: ["Original", "Mint", "Rose", "Cool White", "Morandi", "Amber", "Lavender"],
        glow: "Glow Mode",
        recording: "REC",
        alertPermission: "Camera permission needed. Please use HTTPS/localhost.",
        videoNoFilter: "Video (No Filter)",
        zoom: "ZOOM"
    },
    zh: {  // 繁體中文
        enterCamera: "📷 進入相機",
        intro: "📖 項目介紹 (即將開放)",
        back: "← 返回",
        retake: "重新拍攝",
        download: "下載",
        filters: ["原色", "淺綠", "淺粉", "冷白", "莫蘭迪", "琥珀", "紫羅蘭"],
        glow: "散光模式",
        recording: "錄製中",
        alertPermission: "需要相機權限，請使用 HTTPS/localhost 訪問",
        videoNoFilter: "影片 (無濾鏡)",
        zoom: "焦距"
    }
};

let currentLang = "en";   // 默認英語
let mediaStream = null;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let recordingStartTime = 0;
let recordingTimerInterval = null;

// 媒體類型
let currentMediaType = null; // 'photo' or 'video'
let originalPhotoBlob = null;
let originalVideoBlob = null;
let currentFilterIndex = 0;
let glowEnabled = false;
let filterItems = [];

// 变焦相关变量
let videoTrack = null;
let zoomCapabilities = null;
let currentZoom = 1;
let zoomSupported = false;

// DOM 元素
const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');
const video = document.getElementById('video');
const previewImg = document.getElementById('previewImg');
const previewVideo = document.getElementById('previewVideo');
const filterTrack = document.getElementById('filterTrack');
const glowToggle = document.getElementById('glowToggle');
const glowLabel = document.getElementById('glowLabel');
const filterSection = document.getElementById('filterSection');
const recordTimer = document.getElementById('recordTimer');
const langToggleBtn = document.getElementById('langToggleBtn');
const filterBadge = document.getElementById('filterBadge');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');

// 变焦控件
const zoomControl = document.getElementById('zoomControl');
const zoomSlider = document.getElementById('zoomSlider');
const zoomValueSpan = document.getElementById('zoomValue');
const zoomLabelSpan = document.getElementById('zoomLabel');

// 对焦指示器
const focusIndicator = document.getElementById('focusIndicator');

// ========== 通用UI更新 ==========
function updateUI() {
    const t = i18n[currentLang];
    document.getElementById('enterCameraBtn').textContent = t.enterCamera;
    document.getElementById('introBtn').textContent = t.intro;
    document.getElementById('backHomeBtn').textContent = t.back;
    document.getElementById('backFromPreviewBtn').textContent = t.back;
    document.getElementById('reTakeBtn').textContent = t.retake;
    document.getElementById('downloadBtn').textContent = t.download;
    glowLabel.textContent = t.glow;
    langToggleBtn.textContent = currentLang === "en" ? "中文" : "English";
    if (zoomLabelSpan) zoomLabelSpan.textContent = t.zoom;
    
    if (filterItems.length) buildFilterUI();
    updateMediaSpecificBadge();
}

function updateMediaSpecificBadge() {
    if (previewPage.style.display !== 'flex') return;
    if (currentMediaType === 'photo') {
        updateFilterBadge();
    } else if (currentMediaType === 'video') {
        const t = i18n[currentLang];
        filterBadge.textContent = t.videoNoFilter;
    }
}

function updateFilterBadge() {
    const filters = i18n[currentLang].filters;
    if (currentMediaType === 'photo') {
        let text = filters[currentFilterIndex];
        if (glowEnabled) text += " ✨";
        filterBadge.textContent = text;
    } else if (currentMediaType === 'video') {
        const t = i18n[currentLang];
        filterBadge.textContent = t.videoNoFilter;
    }
}

// ========== 变焦 + 对焦功能 ==========
async function setupZoomAndFocus() {
    if (!mediaStream) return;
    videoTrack = mediaStream.getVideoTracks()[0];
    if (!videoTrack) return;
    
    const capabilities = videoTrack.getCapabilities();
    // 检查变焦支持
    if (capabilities.zoom && capabilities.zoom.max > 1) {
        zoomSupported = true;
        const minZoom = capabilities.zoom.min || 1;
        const maxZoom = capabilities.zoom.max;
        const step = capabilities.zoom.step || 0.01;
        zoomSlider.min = minZoom;
        zoomSlider.max = maxZoom;
        zoomSlider.step = step;
        currentZoom = 1;
        zoomSlider.value = 1;
        zoomValueSpan.textContent = `1.0x`;
        zoomControl.style.display = 'flex';
        
        // 移除旧监听，重新绑定
        const zoomHandler = () => {
            const val = parseFloat(zoomSlider.value);
            currentZoom = val;
            zoomValueSpan.textContent = val.toFixed(2) + 'x';
            videoTrack.applyConstraints({ advanced: [{ zoom: val }] }).catch(e => console.warn("zoom failed", e));
        };
        zoomSlider.oninput = zoomHandler;
    } else {
        zoomSupported = false;
        zoomControl.style.display = 'none';
    }
}

// 显示对焦动画并尝试对焦
function showFocusAnimation(x, y) {
    focusIndicator.style.left = x + 'px';
    focusIndicator.style.top = y + 'px';
    focusIndicator.style.opacity = '1';
    setTimeout(() => {
        focusIndicator.style.opacity = '0';
    }, 300);
}

async function setFocusPoint(clientX, clientY) {
    if (!videoTrack) return;
    const rect = video.getBoundingClientRect();
    const relativeX = (clientX - rect.left) / rect.width;
    const relativeY = (clientY - rect.top) / rect.height;
    if (relativeX < 0 || relativeX > 1 || relativeY < 0 || relativeY > 1) return;
    
    showFocusAnimation(clientX, clientY);
    
    // 尝试使用 pointsOfInterest (大多数移动端浏览器支持)
    try {
        const constraints = {
            advanced: [{ pointsOfInterest: [{ x: relativeX, y: relativeY }] }]
        };
        await videoTrack.applyConstraints(constraints);
        console.log("Focus set using pointsOfInterest");
        return;
    } catch (e) {
        console.warn("pointsOfInterest not supported, fallback to continuous focus mode", e);
    }
    
    // fallback: 切换一次 focusMode 触发自动对焦
    try {
        const caps = videoTrack.getCapabilities();
        if (caps.focusMode && caps.focusMode.includes('continuous')) {
            await videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
            console.log("Triggered continuous focus");
        } else if (caps.focusMode && caps.focusMode.includes('auto')) {
            await videoTrack.applyConstraints({ advanced: [{ focusMode: 'auto' }] });
        }
    } catch (err) {
        console.warn("Focus fallback failed", err);
    }
}

// 视频点击事件绑定
function attachVideoFocusHandler() {
    video.removeEventListener('click', videoClickHandler);
    video.addEventListener('click', videoClickHandler);
}

function videoClickHandler(e) {
    if (!videoTrack) return;
    setFocusPoint(e.clientX, e.clientY);
}

// ========== 初始化摄像头（后置） ==========
async function initCamera() {
    try {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        
        const constraints = {
            video: {
                facingMode: { exact: "environment" },
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            }
        };
        
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = mediaStream;
        await video.play();
        
        videoTrack = mediaStream.getVideoTracks()[0];
        const settings = videoTrack.getSettings();
        console.log("后置摄像头:", settings.width, "x", settings.height);
        
        // 设置变焦和对焦能力
        await setupZoomAndFocus();
        attachVideoFocusHandler();
        return true;
    } catch (err) {
        console.error("Camera error:", err);
        alert(i18n[currentLang].alertPermission);
        return false;
    }
}

// ==================== 濾鏡核心算法 ====================
function applyFilterToPixel(r, g, b, index) {
    switch(index) {
        case 1: return [Math.min(255, r * 0.75), Math.min(255, g * 1.35), Math.min(255, b * 0.7)];
        case 2: return [Math.min(255, r * 1.3 + 15), Math.min(255, g * 0.8), Math.min(255, b * 0.85)];
        case 3:
            let gray = (r + g + b) / 3;
            return [Math.min(255, (r * 0.9 + gray * 0.3) * 1.15), 
                    Math.min(255, (g * 0.95 + gray * 0.25) * 1.15), 
                    Math.min(255, (b * 1.1 + gray * 0.2) * 1.15)];
        case 4:
            let gray2 = 0.299 * r + 0.587 * g + 0.114 * b;
            let sat = 0.6;
            return [Math.min(255, r * sat + gray2 * (1 - sat) * 0.95),
                    Math.min(255, g * sat + gray2 * (1 - sat) * 0.95),
                    Math.min(255, b * sat + gray2 * (1 - sat) * 0.95 + 10)];
        case 5: return [Math.min(255, r * 1.2 + 18), Math.min(255, g * 0.92 + 10), Math.min(255, b * 0.65)];
        case 6: return [Math.min(255, r * 0.92 + b * 0.3), Math.min(255, g * 0.75), Math.min(255, b * 1.2 + 22)];
        default: return [r, g, b];
    }
}

function applyFilterToImageData(imageData, filterIndex, withGlow) {
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        let [r, g, b] = applyFilterToPixel(data[i], data[i+1], data[i+2], filterIndex);
        data[i] = r;
        data[i+1] = g;
        data[i+2] = b;
        if (withGlow) {
            data[i] = Math.min(255, data[i] + 18);
            data[i+1] = Math.min(255, data[i+1] + 14);
            data[i+2] = Math.min(255, data[i+2] + 12);
        }
    }
    return imageData;
}

// 拍照
async function takePhoto() {
    if (isRecording) return;
    if (!video.videoWidth) return;
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    canvas.toBlob(async (blob) => {
        if (blob) {
            currentMediaType = 'photo';
            originalPhotoBlob = blob;
            originalVideoBlob = null;
            currentFilterIndex = 0;
            glowEnabled = false;
            glowToggle.classList.remove('active');
            filterSection.style.display = 'flex';
            await applyFilterToPhoto();
            cameraPage.style.display = 'none';
            previewPage.style.display = 'flex';
            updateFilterBadge();
        }
    }, 'image/jpeg', 0.95);
}

async function applyFilterToPhoto() {
    if (!originalPhotoBlob) return;
    const img = new Image();
    const url = URL.createObjectURL(originalPhotoBlob);
    return new Promise((resolve) => {
        img.onload = () => {
            const w = img.width, h = img.height;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0);
            let imageData = tempCtx.getImageData(0, 0, w, h);
            imageData = applyFilterToImageData(imageData, currentFilterIndex, glowEnabled);
            tempCtx.putImageData(imageData, 0, 0);
            tempCanvas.toBlob((blob) => {
                if (blob) {
                    const previewUrl = URL.createObjectURL(blob);
                    previewImg.src = previewUrl;
                    previewImg.style.display = 'block';
                    previewVideo.style.display = 'none';
                }
                URL.revokeObjectURL(url);
                resolve();
            }, 'image/jpeg', 0.92);
        };
        img.src = url;
    });
}

// ==================== 錄影（無濾鏡） ====================
async function startRecording() {
    if (!mediaStream || isRecording) return;
    recordedChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = async () => {
        const videoBlob = new Blob(recordedChunks, { type: 'video/mp4' });
        currentMediaType = 'video';
        originalVideoBlob = videoBlob;
        originalPhotoBlob = null;
        filterSection.style.display = 'none';
        const t = i18n[currentLang];
        filterBadge.textContent = t.videoNoFilter;
        const url = URL.createObjectURL(videoBlob);
        previewVideo.src = url;
        previewVideo.style.display = 'block';
        previewImg.style.display = 'none';
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
        stopRecordingTimer();
    };
    mediaRecorder.start();
    isRecording = true;
    videoRecordBtn.classList.add('recording');
    recordingStartTime = Date.now();
    startRecordingTimer();
    setTimeout(() => {
        if (isRecording) stopRecording();
    }, 3000);
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        videoRecordBtn.classList.remove('recording');
        stopRecordingTimer();
    }
}

function startRecordingTimer() {
    if (recordingTimerInterval) clearInterval(recordingTimerInterval);
    recordingTimerInterval = setInterval(() => {
        if (isRecording) {
            const elapsed = (Date.now() - recordingStartTime) / 1000;
            recordTimer.textContent = `⏺ ${elapsed.toFixed(1)}s / 3.0s`;
            recordTimer.classList.add('show');
            if (elapsed >= 3.0) stopRecording();
        }
    }, 100);
}

function stopRecordingTimer() {
    if (recordingTimerInterval) {
        clearInterval(recordingTimerInterval);
        recordingTimerInterval = null;
    }
    recordTimer.classList.remove('show');
}

// ==================== 濾鏡UI建構 ====================
function buildFilterUI() {
    const filters = i18n[currentLang].filters;
    filterTrack.innerHTML = '';
    filterItems = [];
    filters.forEach((name, idx) => {
        const div = document.createElement('div');
        div.className = 'filter-item';
        if (idx === currentFilterIndex) div.classList.add('active');
        div.textContent = name;
        div.onclick = async () => {
            currentFilterIndex = idx;
            filterItems.forEach((item, i) => {
                if (i === idx) item.classList.add('active');
                else item.classList.remove('active');
            });
            updateFilterBadge();
            if (currentMediaType === 'photo' && originalPhotoBlob) await applyFilterToPhoto();
        };
        filterTrack.appendChild(div);
        filterItems.push(div);
    });
}

// 页面导航
async function goToCamera() {
    const success = await initCamera();
    if (success) {
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
        if (isRecording) stopRecording();
    }
}

function goToHome() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (isRecording) stopRecording();
    cameraPage.style.display = 'none';
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
}

function backToCamera() {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    originalPhotoBlob = null;
    originalVideoBlob = null;
    currentFilterIndex = 0;
    glowEnabled = false;
    glowToggle.classList.remove('active');
    updateFilterBadge();
    if (filterItems.length) {
        filterItems.forEach((item, i) => {
            if (i === 0) item.classList.add('active');
            else item.classList.remove('active');
        });
    }
}

function downloadMedia() {
    if (currentMediaType === 'photo' && previewImg.src && previewImg.src.startsWith('blob:')) {
        const a = document.createElement('a');
        a.href = previewImg.src;
        a.download = `CreNature_${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } else if (currentMediaType === 'video' && originalVideoBlob) {
        const url = URL.createObjectURL(originalVideoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CreNature_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 100);
    }
}

async function toggleLanguage() {
    currentLang = currentLang === "en" ? "zh" : "en";
    updateUI();
    buildFilterUI();
    if (previewPage.style.display === 'flex') {
        if (currentMediaType === 'photo' && originalPhotoBlob) {
            await applyFilterToPhoto();
            updateFilterBadge();
            if (filterItems.length) {
                filterItems.forEach((item, idx) => {
                    if (idx === currentFilterIndex) item.classList.add('active');
                    else item.classList.remove('active');
                });
            }
        } else if (currentMediaType === 'video') {
            const t = i18n[currentLang];
            filterBadge.textContent = t.videoNoFilter;
        }
    }
}

async function toggleGlow() {
    if (currentMediaType !== 'photo') return;
    glowEnabled = !glowEnabled;
    if (glowEnabled) glowToggle.classList.add('active');
    else glowToggle.classList.remove('active');
    updateFilterBadge();
    if (originalPhotoBlob) await applyFilterToPhoto();
}

// 事件绑定
document.getElementById('enterCameraBtn').onclick = goToCamera;
document.getElementById('backHomeBtn').onclick = goToHome;
document.getElementById('backFromPreviewBtn').onclick = backToCamera;
document.getElementById('shutterBtn').onclick = takePhoto;
document.getElementById('videoRecordBtn').onclick = () => {
    if (isRecording) stopRecording();
    else startRecording();
};
document.getElementById('reTakeBtn').onclick = backToCamera;
document.getElementById('downloadBtn').onclick = downloadMedia;
langToggleBtn.onclick = toggleLanguage;
glowToggle.onclick = toggleGlow;

// 初始化
updateUI();
buildFilterUI();
homePage.style.display = 'flex';
cameraPage.style.display = 'none';
previewPage.style.display = 'none';
updateFilterBadge();
filterSection.style.display = 'none'; // 初始预览未出现时隐藏
</script>
</body>
</html>
