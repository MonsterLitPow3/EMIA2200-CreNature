<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 高清相机 & 滑动滤镜 + 散光模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 全局按钮按下特效 */
        .lang-btn:active,
        .btn:active,
        .back-btn:active,
        .shutter-btn:active,
        .filter-item:active,
        .glow-toggle:active {
            background: white !important;
            color: black !important;
            border-color: white !important;
        }
        .shutter-btn:active {
            transform: translateX(-50%) scale(0.94);
        }

        /* 语言切换按钮 */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        
        /* 快门按钮 */
        .shutter-btn {
            position: absolute;
            bottom: max(140px, calc(env(safe-area-inset-bottom) + 100px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.08s linear;
        }

        /* ========= 预览页面 ========= */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow-y: auto;
            padding: 0 20px;
            padding-top: max(70px, env(safe-area-inset-top) + 20px);
            padding-bottom: max(70px, calc(env(safe-area-inset-bottom) + 85px));
            box-sizing: border-box;
        }
        
        .preview-img {
            max-width: 90%;
            max-height: 45vh;
            width: auto;
            height: auto;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin-bottom: 20px;
        }
        
        /* 横向滑动滤镜选择器 (抖音风格) */
        .filter-scroll-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            padding: 12px 0;
            margin: 8px 0 12px;
            scrollbar-width: none;
        }
        .filter-scroll-container::-webkit-scrollbar {
            display: none;
        }
        .filter-track {
            display: inline-flex;
            gap: 20px;
            padding: 0 calc(50% - 70px);
        }
        .filter-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 48px;
            border-radius: 60px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.1s ease;
            scroll-snap-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .filter-item.active {
            border: 4px solid white;
            background: rgba(255,255,255,0.25);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
            font-weight: 600;
        }
        
        /* 散光模式开关 */
        .glow-mode-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0 20px;
        }
        .glow-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: 0.08s linear;
        }
        .glow-toggle span:first-child {
            font-size: 18px;
        }
        .glow-toggle span:last-child {
            font-size: 14px;
            font-weight: 500;
        }
        .glow-toggle.active {
            background: rgba(255,255,255,0.25);
            border-color: white;
        }
        
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
            margin: 0;
        }
        
        .preview-buttons .btn {
            width: 240px;
        }
        
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }
        
        @media (max-width: 480px) and (max-height: 700px) {
            .preview-img {
                max-height: 38vh;
                margin-bottom: 12px;
            }
            .filter-item {
                width: 120px;
                height: 42px;
                font-size: 13px;
            }
            .filter-track {
                padding: 0 calc(50% - 60px);
            }
            .glow-toggle {
                padding: 6px 16px;
            }
        }

        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 预览页面（新增横向滑动滤镜栏 + 散光模式开关） -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    
    <!-- 横向滑动滤镜选择器 -->
    <div class="filter-scroll-container" id="filterScroll">
        <div class="filter-track" id="filterTrack"></div>
    </div>
    
    <!-- 散光模式开关 -->
    <div class="glow-mode-container">
        <div class="glow-toggle" id="glowToggle">
            <span>✨</span>
            <span id="glowLabel">散光模式</span>
        </div>
    </div>
    
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost",
        filters: ["Original", "Soft Mint", "Dusty Pink", "Cool White", "Morandi", "Amber Glow", "Lavender Haze"],
        glowMode: "Glow Mode"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开",
        filters: ["原色", "浅绿散光", "浅粉散光", "柔白冷调", "莫兰迪", "琥珀暖光", "紫罗兰雾"],
        glowMode: "散光模式"
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');
const filterTrack = document.getElementById('filterTrack');
const filterScrollContainer = document.getElementById('filterScroll');
const glowToggle = document.getElementById('glowToggle');
const glowLabel = document.getElementById('glowLabel');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');
const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');
const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let capturedBlobUrl = null;         // 当前显示的图片（已应用滤镜）的blob
let originalImageBlob = null;       // 原始拍照图片blob
let originalImageElement = null;    // 原始图片元素
let currentFilterIndex = 0;         // 0-6
let filterItems = [];               // DOM元素数组
let glowEnabled = false;            // 散光模式开关状态

// ---------- 滤镜算法 (保持不变) ----------
function applyOriginalFilter(imgData) { return imgData; }
function applyLightGreenFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i+1] = Math.min(255, g * 1.32);
        data[i] = r * 0.78;
        data[i+2] = b * 0.72;
    }
    return imgData;
}
function applyLightPinkFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 1.28 + 18);
        data[i+1] = g * 0.82;
        data[i+2] = b * 0.86;
    }
    return imgData;
}
function applyCoolWhiteFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let gray = (r + g + b) / 3;
        data[i] = Math.min(255, (r * 0.92 + gray * 0.35) * 1.18);
        data[i+1] = Math.min(255, (g * 1.0 + gray * 0.28) * 1.18);
        data[i+2] = Math.min(255, (b * 1.12 + gray * 0.2) * 1.18);
    }
    return imgData;
}
function applyMorandiFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        let sat = 0.62;
        data[i] = Math.min(255, r * sat + gray * (1 - sat) * 0.96 + 8);
        data[i+1] = Math.min(255, g * sat + gray * (1 - sat) * 0.96 + 8);
        data[i+2] = Math.min(255, b * sat + gray * (1 - sat) * 0.96 + 12);
    }
    return imgData;
}
function applyAmberFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 1.22 + 22);
        data[i+1] = Math.min(255, g * 0.94 + 12);
        data[i+2] = b * 0.68;
    }
    return imgData;
}
function applyVioletFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 0.94 + b * 0.28);
        data[i+1] = g * 0.78;
        data[i+2] = Math.min(255, b * 1.18 + 25);
    }
    return imgData;
}
function getFilterByIndex(index) {
    switch(index) {
        case 0: return applyOriginalFilter;
        case 1: return applyLightGreenFilter;
        case 2: return applyLightPinkFilter;
        case 3: return applyCoolWhiteFilter;
        case 4: return applyMorandiFilter;
        case 5: return applyAmberFilter;
        case 6: return applyVioletFilter;
        default: return applyOriginalFilter;
    }
}

// 应用滤镜 + 可选散光效果（保留清晰主体）
async function applyFilterAndUpdate(filterIndex, withGlow = glowEnabled) {
    if (!originalImageElement || !originalImageElement.complete) return false;
    const img = originalImageElement;
    const width = img.naturalWidth;
    const height = img.naturalHeight;
    
    // 第一步：应用滤镜
    const filterCanvas = document.createElement('canvas');
    filterCanvas.width = width;
    filterCanvas.height = height;
    const filterCtx = filterCanvas.getContext('2d');
    filterCtx.drawImage(img, 0, 0);
    let imageData = filterCtx.getImageData(0, 0, width, height);
    imageData = getFilterByIndex(filterIndex)(imageData);
    filterCtx.putImageData(imageData, 0, 0);
    
    let finalCanvas = filterCanvas;
    
    // 第二步：如果需要散光效果，叠加光晕（保持细节清晰）
    if (withGlow) {
        // 创建光晕层：复制滤镜后的图像，轻微高斯模糊，然后以 screen 方式混合
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = width;
        glowCanvas.height = height;
        const glowCtx = glowCanvas.getContext('2d');
        glowCtx.drawImage(filterCanvas, 0, 0);
        // 应用轻微模糊产生散光感
        glowCtx.filter = 'blur(6px)';
        glowCtx.drawImage(filterCanvas, 0, 0);
        glowCtx.filter = 'none';
        
        // 将模糊层与原滤镜层以 screen (减淡) 模式混合，透明度控制强度
        finalCanvas = document.createElement('canvas');
        finalCanvas.width = width;
        finalCanvas.height = height;
        const finalCtx = finalCanvas.getContext('2d');
        finalCtx.drawImage(filterCanvas, 0, 0); // 先绘制清晰滤镜层
        finalCtx.globalCompositeOperation = 'screen';
        finalCtx.globalAlpha = 0.35;  // 散光强度适中，保留细节
        finalCtx.drawImage(glowCanvas, 0, 0);
        finalCtx.globalCompositeOperation = 'source-over';
        finalCtx.globalAlpha = 1.0;
    }
    
    // 输出最终图片
    return new Promise((resolve) => {
        finalCanvas.toBlob((blob) => {
            if (blob) {
                if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
                capturedBlobUrl = URL.createObjectURL(blob);
                previewImg.src = capturedBlobUrl;
                resolve(true);
            } else resolve(false);
        }, 'image/png');
    });
}

// 刷新当前滤镜（用于散光开关切换时）
async function refreshCurrentFilter() {
    if (originalImageElement) {
        await applyFilterAndUpdate(currentFilterIndex, glowEnabled);
    }
}

// 构建滤镜滑动条UI
function buildFilterUI() {
    const filters = i18n[currentLang].filters;
    filterTrack.innerHTML = '';
    filterItems = [];
    filters.forEach((name, idx) => {
        const div = document.createElement('div');
        div.className = 'filter-item';
        if (idx === currentFilterIndex) div.classList.add('active');
        div.textContent = name;
        div.dataset.index = idx;
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            setFilterIndex(idx, true);
        });
        filterTrack.appendChild(div);
        filterItems.push(div);
    });
    scrollToIndex(currentFilterIndex);
}

function scrollToIndex(index) {
    if (!filterItems[index]) return;
    const container = filterScrollContainer;
    const item = filterItems[index];
    const containerRect = container.getBoundingClientRect();
    const itemRect = item.getBoundingClientRect();
    const scrollLeft = container.scrollLeft + (itemRect.left - containerRect.left) - (containerRect.width / 2) + (itemRect.width / 2);
    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
}

function setFilterIndex(newIndex, updateScroll = true) {
    if (newIndex === currentFilterIndex) return;
    currentFilterIndex = newIndex;
    filterItems.forEach((item, i) => {
        if (i === currentFilterIndex) item.classList.add('active');
        else item.classList.remove('active');
    });
    refreshCurrentFilter();
    if (updateScroll) scrollToIndex(currentFilterIndex);
}

// 监听滚动结束，自动吸附并切换滤镜
let scrollTimeout = null;
filterScrollContainer.addEventListener('scroll', () => {
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        const container = filterScrollContainer;
        const scrollLeft = container.scrollLeft;
        const containerWidth = container.clientWidth;
        let closestIndex = 0;
        let minDistance = Infinity;
        filterItems.forEach((item, idx) => {
            const itemCenter = item.offsetLeft + item.clientWidth / 2;
            const scrollCenter = scrollLeft + containerWidth / 2;
            const distance = Math.abs(itemCenter - scrollCenter);
            if (distance < minDistance) {
                minDistance = distance;
                closestIndex = idx;
            }
        });
        if (closestIndex !== currentFilterIndex) {
            setFilterIndex(closestIndex, false);
            scrollToIndex(closestIndex);
        }
    }, 80);
});

// 散光模式切换
function toggleGlowMode() {
    glowEnabled = !glowEnabled;
    if (glowEnabled) {
        glowToggle.classList.add('active');
    } else {
        glowToggle.classList.remove('active');
    }
    refreshCurrentFilter();
}

glowToggle.addEventListener('click', toggleGlowMode);

// 初始化预览（传入原始图片blob）
async function initPreviewWithOriginal(blob) {
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
    originalImageBlob = blob;
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = async () => {
        originalImageElement = img;
        currentFilterIndex = 0;
        glowEnabled = false;
        glowToggle.classList.remove('active');
        buildFilterUI();
        await refreshCurrentFilter();
        URL.revokeObjectURL(url);
    };
    img.src = url;
}

// ---------- 相机相关（原保留）----------
async function getMaxResolutionStream() {
    let tempStream = null;
    try {
        tempStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } }
        });
    } catch {
        tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    }
    const track = tempStream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if (caps.width && caps.width.max) {
        try { await track.applyConstraints({ width: { exact: caps.width.max }, height: { exact: caps.height.max } }); } catch(e) {}
    }
    return tempStream;
}

enterCameraBtn.onclick = async () => {
    try {
        mediaStream = await getMaxResolutionStream();
        video.srcObject = mediaStream;
        await new Promise(resolve => video.onloadeddata = resolve);
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch { alert(i18n[currentLang].alertPermission); }
};

async function capturePhoto() {
    if (!video.videoWidth) return false;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    return new Promise(resolve => {
        canvas.toBlob(async (blob) => {
            if (blob) {
                await initPreviewWithOriginal(blob);
                resolve(true);
            } else resolve(false);
        }, 'image/png');
    });
}

shutterBtn.onclick = async () => {
    if (!video.videoWidth) await new Promise(r => setTimeout(r, 100));
    if (await capturePhoto()) {
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
    }
};

reTakeBtn.onclick = () => {
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    originalImageElement = null;
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    if (mediaStream) video.play().catch(e=>{});
};

function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 200);
}
downloadBtn.onclick = () => {
    if (capturedBlobUrl) triggerDownload(capturedBlobUrl, `CreNature_${Date.now()}.png`);
    else alert("No photo");
};

backHomeBtn.onclick = () => { stopCamera(); cameraPage.style.display = 'none'; homePage.style.display = 'flex'; };
backFromPreviewBtn.onclick = () => {
    stopCamera();
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
};
function stopCamera() {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (video.srcObject) video.srcObject = null;
}

// 语言切换
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
    glowLabel.textContent = texts.glowMode;
    if (originalImageElement) buildFilterUI();
}
langToggleBtn.onclick = () => updateLanguage(currentLang === "en" ? "zh" : "en");

window.onbeforeunload = () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
};
updateLanguage('en');
</script>
</body>
</html>
