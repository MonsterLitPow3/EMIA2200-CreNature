<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            /* 禁止选中 / 禁止长按复制 */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            /* 完全锁死，不滑动、不被遮挡 */
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 语言切换按钮（全局右上角） */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        /* 所有按钮按下特效：白底黑字 */
        .lang-btn:active,
        .btn:active,
        .back-btn:active,
        .shutter-btn:active {
            background: white !important;
            color: black !important;
            border-color: white !important;
        }
        .shutter-btn:active {
            transform: translateX(-50%) scale(0.96);
            background: white !important;
        }

        /* 首页 - 增强底部安全区域，避免系统应用栏遮挡 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        
        /* 快门按钮 - 始终避开底部应用栏，使用充足安全区 */
        .shutter-btn {
            position: absolute;
            bottom: max(90px, calc(env(safe-area-inset-bottom) + 60px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.08s linear;
        }
        .shutter-btn:active {
            background: white !important;
            border-color: white !important;
            transform: translateX(-50%) scale(0.94);
        }

        /* 预览照片页面 —— 完全杜绝滚动，所有内容适应一屏，不溢出，无滑动条 */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding-top: max(70px, env(safe-area-inset-top) + 15px);
            padding-bottom: max(35px, calc(env(safe-area-inset-bottom) + 30px));
            padding-left: 20px;
            padding-right: 20px;
            background: #000;
            position: relative;
            overflow: hidden;        /* 禁止滚动，所有内容强制显示在一屏内 */
            box-sizing: border-box;
        }
        
        .preview-img {
            max-width: 82%;
            max-height: 55vh;        /* 限制最大高度，确保按钮组可见 */
            width: auto;
            height: auto;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            flex-shrink: 1;
        }
        
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
            margin-top: 8px;
            flex-shrink: 0;
        }
        
        .preview-buttons .btn {
            width: 220px;
        }
        
        /* 预览页面左上角返回按钮 (独立定位，不影响布局流) */
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }

        #captureCanvas {
            display: none;
        }
        
        /* 极小屏幕适配: 图片比例微调，依然无滚动 */
        @media (max-width: 480px) and (max-height: 680px) {
            .preview-img {
                max-height: 48vh;
            }
            .preview-buttons {
                gap: 14px;
            }
            .shutter-btn {
                width: 64px;
                height: 64px;
                bottom: max(80px, calc(env(safe-area-inset-bottom) + 50px));
            }
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 照片预览页面（无滚动，一屏显示完整，同时修复移动端下载） -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开"
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let capturedBlobUrl = null;      // 存储最新拍摄图片的blob URL，用于下载
let currentImageData = null;     // 保留canvas的base64备用，但下载用blob更可靠

// 语言切换
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
}

langToggleBtn.addEventListener('click', () => {
    updateLanguage(currentLang === "en" ? "zh" : "en");
});

// 进入相机
enterCameraBtn.addEventListener('click', async () => {
    try {
        // 请求后置摄像头最佳分辨率
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            },
            audio: false
        });
        video.srcObject = mediaStream;
        // 确保视频流已加载
        await new Promise((resolve) => {
            if (video.readyState >= 2) {
                resolve();
            } else {
                video.onloadeddata = () => resolve();
            }
        });
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch (err) {
        console.warn(err);
        alert(i18n[currentLang].alertPermission);
    }
});

// 拍照核心逻辑 (捕获图片，生成预览和blob下载资源)
function capturePhoto() {
    if (!video.videoWidth || !video.videoHeight) {
        console.warn("video metadata not ready");
        return false;
    }
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 生成预览用的 base64 (保留)
    const previewDataUrl = canvas.toDataURL('image/png');
    previewImg.src = previewDataUrl;
    
    // 释放旧的 blob URL 避免内存泄漏
    if (capturedBlobUrl) {
        URL.revokeObjectURL(capturedBlobUrl);
        capturedBlobUrl = null;
    }
    
    // 重要：为了移动端（iPhone/iPad）能够正常下载，将 canvas 转为 Blob 并生成临时对象URL
    // 这是最可靠的跨平台下载方案（支持 Safari iOS）
    return new Promise((resolve) => {
        canvas.toBlob((blob) => {
            if (blob) {
                capturedBlobUrl = URL.createObjectURL(blob);
                resolve(true);
            } else {
                // 降级使用 base64 作为后备
                capturedBlobUrl = previewDataUrl;
                resolve(true);
            }
        }, 'image/png');
    });
}

// 快门按钮点击：拍照并跳转预览
shutterBtn.addEventListener('click', async () => {
    if (!video.videoWidth || !video.videoHeight) {
        // 极少数情况视频未准备好，延迟重试
        await new Promise(r => setTimeout(r, 80));
        if (!video.videoWidth) return;
    }
    const success = await capturePhoto();
    if (success) {
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
    }
});

// 重拍: 返回相机
reTakeBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    // 确保相机视频流依然活动
    if (mediaStream && mediaStream.active && video.srcObject) {
        video.play().catch(e => console.warn);
    }
});

// 下载照片 —— 完美支持手机/iPad/电脑 (使用blob URL)
downloadBtn.addEventListener('click', () => {
    if (!capturedBlobUrl) {
        // 如果因某种原因丢失，重新从canvas生成blob
        if (canvas.width > 0 && canvas.height > 0) {
            canvas.toBlob((blob) => {
                if (blob) {
                    const tempUrl = URL.createObjectURL(blob);
                    triggerDownload(tempUrl);
                    setTimeout(() => URL.revokeObjectURL(tempUrl), 200);
                } else {
                    alert("Unable to generate photo, please retake.");
                }
            }, 'image/png');
        } else {
            alert("Photo not available, please retake.");
        }
        return;
    }
    triggerDownload(capturedBlobUrl);
});

// 通用下载触发函数 (兼容移动端)
function triggerDownload(url) {
    const link = document.createElement('a');
    link.href = url;
    link.download = `CreNature_${Date.now()}.png`;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => {
        document.body.removeChild(link);
    }, 150);
}

// 返回首页（从相机页）
backHomeBtn.addEventListener('click', () => {
    stopCamera();
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 从预览页返回首页（释放相机资源并回到首页）
backFromPreviewBtn.addEventListener('click', () => {
    stopCamera();
    // 清理 blob URL 避免残留
    if (capturedBlobUrl) {
        URL.revokeObjectURL(capturedBlobUrl);
        capturedBlobUrl = null;
    }
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 统一停止相机并释放资源
function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (video.srcObject) {
        video.srcObject = null;
    }
}

// 页面彻底卸载前清理资源
window.addEventListener('beforeunload', () => {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
    }
    if (capturedBlobUrl) {
        URL.revokeObjectURL(capturedBlobUrl);
    }
});

// 初始化语言
updateLanguage('en');

// 额外处理安全区导致内容极端紧凑的情况：确保预览页在任何手机尺寸下都不会溢出产生滚动条
// （强制body和preview-wrap overflow hidden，且内容高度自适应）
// 如果因某些浏览器导致图片被裁切，CSS 已经做了充分约束，所有内容保持可见
</script>
</body>
</html>
