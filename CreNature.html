<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 高清相机 & 滑动滤镜 + 录像模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .lang-btn:active,
        .btn:active,
        .back-btn:active,
        .shutter-btn:active,
        .video-record-btn:active,
        .filter-item:active,
        .glow-toggle:active,
        .mode-switch-btn:active {
            background: white !important;
            color: black !important;
            border-color: white !important;
        }
        .shutter-btn:active, .video-record-btn:active {
            transform: translateX(-50%) scale(0.94);
        }

        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
        }

        .mode-switch-container {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 6px 12px;
            margin-bottom: 15px;
        }
        .mode-switch-btn {
            padding: 12px 28px;
            border-radius: 32px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .mode-switch-btn.active {
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* 录像模式提示 */
        .record-timer {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            color: #ff3b30;
            z-index: 10;
            display: none;
            font-family: monospace;
        }
        .record-timer.recording {
            display: block;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        
        .shutter-btn {
            position: absolute;
            bottom: max(140px, calc(env(safe-area-inset-bottom) + 100px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.08s linear;
        }
        
        .video-record-btn {
            position: absolute;
            bottom: max(140px, calc(env(safe-area-inset-bottom) + 100px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #ff3b30;
            border: 3px solid rgba(255,255,255,0.8);
            z-index: 10;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 0 12px rgba(255,59,48,0.5);
        }
        .video-record-btn.recording {
            background: #ffaa00;
            transform: translateX(-50%) scale(0.92);
            box-shadow: 0 0 20px rgba(255,170,0,0.8);
        }

        /* 预览页面 */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow-y: auto;
            padding: 0 20px;
            padding-top: max(70px, env(safe-area-inset-top) + 20px);
            padding-bottom: max(70px, calc(env(safe-area-inset-bottom) + 85px));
            box-sizing: border-box;
        }
        
        .preview-img, .preview-video {
            max-width: 90%;
            max-height: 45vh;
            width: auto;
            height: auto;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin-bottom: 20px;
        }
        .preview-video {
            background: #000;
        }
        
        .filter-scroll-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            padding: 12px 0;
            margin: 8px 0 12px;
            scrollbar-width: none;
        }
        .filter-scroll-container::-webkit-scrollbar {
            display: none;
        }
        .filter-track {
            display: inline-flex;
            gap: 20px;
            padding: 0 calc(50% - 70px);
        }
        .filter-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 48px;
            border-radius: 60px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.1s ease;
            scroll-snap-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .filter-item.active {
            border: 4px solid white;
            background: rgba(255,255,255,0.25);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
            font-weight: 600;
        }
        
        .glow-mode-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0 20px;
        }
        .glow-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: 0.08s linear;
        }
        .glow-toggle span:first-child {
            font-size: 18px;
        }
        .glow-toggle span:last-child {
            font-size: 14px;
            font-weight: 500;
        }
        .glow-toggle.active {
            background: rgba(255,255,255,0.25);
            border-color: white;
        }
        
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
            margin: 0;
        }
        
        .preview-buttons .btn {
            width: 240px;
        }
        
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }
        
        /* 加载动画 */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .processing-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .processing-text {
            color: white;
            font-size: 16px;
        }
        .processing-progress {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .processing-progress-bar {
            width: 0%;
            height: 100%;
            background: white;
            transition: width 0.2s;
        }
        
        @media (max-width: 480px) and (max-height: 700px) {
            .preview-img, .preview-video {
                max-height: 38vh;
                margin-bottom: 12px;
            }
            .filter-item {
                width: 120px;
                height: 42px;
                font-size: 13px;
            }
            .filter-track {
                padding: 0 calc(50% - 60px);
            }
        }

        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <div class="mode-switch-container">
        <button class="mode-switch-btn" id="photoModeBtn" class="active">📷 拍照</button>

    </div>
    <div id="modeHint" style="font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 5px;"></div>

<div class="camera-wrap" id="cameraPage">

    <div class="processing-progress">
        <div class="processing-progress-bar" id="progressBar"></div>

</div>

<canvas id="captureCanvas"></canvas>

<script>
// ==================== 语言配置 ====================
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake",
        downloadBtn: "Download",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost",
        filters: ["Original", "Soft Mint", "Dusty Pink", "Cool White", "Morandi", "Amber Glow", "Lavender Haze"],
        glowMode: "Glow Mode",
        photoMode: "📷 Photo",
        videoMode: "🎥 Video (Max 3s)",
        modeHintPhoto: "Tap shutter button to take photo",
        modeHintVideo: "Tap record button to record 3s video",
        processingVideo: "Processing video with filters...",
        recordingTimer: "REC",
        videoLimitReached: "Maximum 3 seconds reached"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入相机模式",
        backBtn: "返回",
        reTakeBtn: "重新拍摄",
        downloadBtn: "下载",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开",
        filters: ["原色", "浅绿散光", "浅粉散光", "柔白冷调", "莫兰迪", "琥珀暖光", "紫罗兰雾"],
        glowMode: "散光模式",
        photoMode: "📷 拍照",
        videoMode: "🎥 录像 (最长3秒)",
        modeHintPhoto: "点击快门按钮拍照",
        modeHintVideo: "点击录像按钮录制3秒视频",
        processingVideo: "正在处理视频滤镜...",
        recordingTimer: "录制",
        videoLimitReached: "已达最长3秒"
    }
};

// ==================== 全局变量 ====================
let currentLang = "en";
let currentMode = "photo";  // "photo" 或 "video"
let mediaStream = null;
let videoElement = document.getElementById('video');
let canvas = document.getElementById('captureCanvas');
let ctx = canvas.getContext('2d');

// 录像相关
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let recordingStartTime = 0;
let recordingTimerInterval = null;

// 预览相关
let originalImageBlob = null;      // 拍照原始图片
let originalVideoBlob = null;      // 录像原始视频
let currentMediaType = null;       // "image" 或 "video"
let currentFilterIndex = 0;
let filterItems = [];
let glowEnabled = false;
let processedVideoBlob = null;      // 处理后的视频

// DOM 元素
const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');
const shutterBtn = document.getElementById('shutterBtn');
const videoRecordBtn = document.getElementById('videoRecordBtn');
const recordTimer = document.getElementById('recordTimer');
const filterTrack = document.getElementById('filterTrack');
const filterScrollContainer = document.getElementById('filterScroll');
const glowToggle = document.getElementById('glowToggle');
const glowLabel = document.getElementById('glowLabel');
const previewImg = document.getElementById('previewImg');
const previewVideo = document.getElementById('previewVideo');
const processingOverlay = document.getElementById('processingOverlay');
const processingText = document.getElementById('processingText');
const progressBar = document.getElementById('progressBar');
const modeHint = document.getElementById('modeHint');

// ==================== 辅助函数 ====================
async function getMaxResolutionStream() {
    let tempStream = null;
    try {
        tempStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 2160 } }
        });
    } catch {
        tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    }
    const track = tempStream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if (caps.width && caps.width.max) {
        try { 
            await track.applyConstraints({ width: { exact: caps.width.max }, height: { exact: caps.height.max } }); 
        } catch(e) { console.log("无法设置最高分辨率", e); }
    }
    console.log("最终分辨率:", track.getSettings().width, "x", track.getSettings().height);
    return tempStream;
}

function showProcessing(show, text = "") {
    if (show) {
        processingText.textContent = text || (currentLang === "en" ? "Processing..." : "处理中...");
        progressBar.style.width = "0%";
        processingOverlay.style.display = "flex";
    } else {
        processingOverlay.style.display = "none";
    }
}

function updateProgress(percent) {
    progressBar.style.width = Math.min(100, percent) + "%";
}

// ==================== 滤镜函数（复用） ====================
function applyOriginalFilter(imgData) { return imgData; }
function applyLightGreenFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i+1] = Math.min(255, g * 1.32);
        data[i] = r * 0.78;
        data[i+2] = b * 0.72;
    }
    return imgData;
}
function applyLightPinkFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 1.28 + 18);
        data[i+1] = g * 0.82;
        data[i+2] = b * 0.86;
    }
    return imgData;
}
function applyCoolWhiteFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let gray = (r + g + b) / 3;
        data[i] = Math.min(255, (r * 0.92 + gray * 0.35) * 1.18);
        data[i+1] = Math.min(255, (g * 1.0 + gray * 0.28) * 1.18);
        data[i+2] = Math.min(255, (b * 1.12 + gray * 0.2) * 1.18);
    }
    return imgData;
}
function applyMorandiFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        let sat = 0.62;
        data[i] = Math.min(255, r * sat + gray * (1 - sat) * 0.96 + 8);
        data[i+1] = Math.min(255, g * sat + gray * (1 - sat) * 0.96 + 8);
        data[i+2] = Math.min(255, b * sat + gray * (1 - sat) * 0.96 + 12);
    }
    return imgData;
}
function applyAmberFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 1.22 + 22);
        data[i+1] = Math.min(255, g * 0.94 + 12);
        data[i+2] = b * 0.68;
    }
    return imgData;
}
function applyVioletFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r * 0.94 + b * 0.28);
        data[i+1] = g * 0.78;
        data[i+2] = Math.min(255, b * 1.18 + 25);
    }
    return imgData;
}
function getFilterByIndex(index) {
    switch(index) {
        case 0: return applyOriginalFilter;
        case 1: return applyLightGreenFilter;
        case 2: return applyLightPinkFilter;
        case 3: return applyCoolWhiteFilter;
        case 4: return applyMorandiFilter;
        case 5: return applyAmberFilter;
        case 6: return applyVioletFilter;
        default: return applyOriginalFilter;
    }
}

// ==================== 图片滤镜处理 ====================
async function applyFilterToImage(filterIndex, withGlow) {
    if (!originalImageBlob) return false;
    const img = new Image();
    const url = URL.createObjectURL(originalImageBlob);
    
    return new Promise((resolve) => {
        img.onload = async () => {
            const width = img.naturalWidth;
            const height = img.naturalHeight;
            
            // 应用滤镜
            const filterCanvas = document.createElement('canvas');
            filterCanvas.width = width;
            filterCanvas.height = height;
            const filterCtx = filterCanvas.getContext('2d');
            filterCtx.drawImage(img, 0, 0);
            let imageData = filterCtx.getImageData(0, 0, width, height);
            imageData = getFilterByIndex(filterIndex)(imageData);
            filterCtx.putImageData(imageData, 0, 0);
            
            let finalCanvas = filterCanvas;
            
            // 散光效果
            if (withGlow) {
                const glowCanvas = document.createElement('canvas');
                glowCanvas.width = width;
                glowCanvas.height = height;
                const glowCtx = glowCanvas.getContext('2d');
                glowCtx.drawImage(filterCanvas, 0, 0);
                glowCtx.filter = 'blur(6px)';
                glowCtx.drawImage(filterCanvas, 0, 0);
                glowCtx.filter = 'none';
                
                finalCanvas = document.createElement('canvas');
                finalCanvas.width = width;
                finalCanvas.height = height;
                const finalCtx = finalCanvas.getContext('2d');
                finalCtx.drawImage(filterCanvas, 0, 0);
                finalCtx.globalCompositeOperation = 'screen';
                finalCtx.globalAlpha = 0.35;
                finalCtx.drawImage(glowCanvas, 0, 0);
                finalCtx.globalCompositeOperation = 'source-over';
            }
            
            finalCanvas.toBlob((blob) => {
                if (blob) {
                    if (window.capturedBlobUrl) URL.revokeObjectURL(window.capturedBlobUrl);
                    window.capturedBlobUrl = URL.createObjectURL(blob);
                    previewImg.src = window.capturedBlobUrl;
                    previewImg.style.display = 'block';
                    previewVideo.style.display = 'none';
                }
                URL.revokeObjectURL(url);
                resolve(true);
            }, 'image/png');
        };
        img.src = url;
    });
}

// ==================== 视频逐帧处理滤镜 ====================
async function processVideoWithFilters(videoBlob, filterIndex, withGlow, onProgress) {
    return new Promise(async (resolve) => {
        const videoUrl = URL.createObjectURL(videoBlob);
        const video = document.createElement('video');
        video.src = videoUrl;
        video.muted = true;
        
        await new Promise((resolve) => {
            video.onloadedmetadata = resolve;
        });
        
        await video.play();
        
        const width = video.videoWidth;
        const height = video.videoHeight;
        const duration = video.duration;  // 最多3秒
        
        // 创建 canvas 用于处理
        const canvasInput = document.createElement('canvas');
        const canvasOutput = document.createElement('canvas');
        canvasInput.width = width;
        canvasInput.height = height;
        canvasOutput.width = width;
        canvasOutput.height = height;
        const ctxInput = canvasInput.getContext('2d');
        
        // 创建 MediaRecorder 输出
        const stream = canvasOutput.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];
        
        recorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        
        recorder.onstop = () => {
            const finalBlob = new Blob(chunks, { type: 'video/webm' });
            URL.revokeObjectURL(videoUrl);
            resolve(finalBlob);
        };
        
        recorder.start();
        
        // 逐帧处理
        const fps = 30;
        const totalFrames = Math.min(Math.floor(duration * fps), 90); // 最多90帧 (3秒)
        let frame = 0;
        
        const processFrame = () => {
            if (video.paused || video.ended || frame >= totalFrames) {
                recorder.stop();
                return;
            }
            
            // 绘制当前帧
            ctxInput.drawImage(video, 0, 0, width, height);
            let imageData = ctxInput.getImageData(0, 0, width, height);
            
            // 应用滤镜
            imageData = getFilterByIndex(filterIndex)(imageData);
            
            // 应用散光
            if (withGlow) {
                // 简单的高斯模糊模拟散光
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(imageData, 0, 0);
                tempCtx.filter = 'blur(5px)';
                tempCtx.drawImage(tempCanvas, 0, 0);
                tempCtx.filter = 'none';
                const blurredData = tempCtx.getImageData(0, 0, width, height);
                
                // 混合
                const outputCtx = canvasOutput.getContext('2d');
                outputCtx.putImageData(imageData, 0, 0);
                outputCtx.globalCompositeOperation = 'screen';
                outputCtx.globalAlpha = 0.35;
                outputCtx.putImageData(blurredData, 0, 0);
                outputCtx.globalCompositeOperation = 'source-over';
            } else {
                canvasOutput.getContext('2d').putImageData(imageData, 0, 0);
            }
            
            frame++;
            if (onProgress) onProgress((frame / totalFrames) * 100);
            
            // 等待下一帧
            setTimeout(processFrame, 1000 / fps);
        };
        
        video.currentTime = 0;
        video.ontimeupdate = () => {
            if (video.currentTime >= frame / fps && !video.paused) {
                processFrame();
                video.ontimeupdate = null;
            }
        };
    });
}

// ==================== 预览刷新 ====================
async function refreshPreview() {
    if (currentMediaType === "image" && originalImageBlob) {
        await applyFilterToImage(currentFilterIndex, glowEnabled);
    } else if (currentMediaType === "video" && originalVideoBlob) {
        showProcessing(true, currentLang === "en" ? "Processing video filters..." : "正在处理视频滤镜...");
        updateProgress(0);
        
        const processedBlob = await processVideoWithFilters(originalVideoBlob, currentFilterIndex, glowEnabled, (p) => {
            updateProgress(p);
        });
        
        processedVideoBlob = processedBlob;
        const url = URL.createObjectURL(processedBlob);
        previewVideo.src = url;
        previewVideo.style.display = 'block';
        previewImg.style.display = 'none';
        
        showProcessing(false);
    }
}

// ==================== 构建滤镜UI ====================
function buildFilterUI() {
    const filters = i18n[currentLang].filters;
    filterTrack.innerHTML = '';
    filterItems = [];
    filters.forEach((name, idx) => {
        const div = document.createElement('div');
        div.className = 'filter-item';
        if (idx === currentFilterIndex) div.classList.add('active');
        div.textContent = name;
        div.dataset.index = idx;
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            setFilterIndex(idx, true);
        });
        filterTrack.appendChild(div);
        filterItems.push(div);
    });
    scrollToIndex(currentFilterIndex);
}

function scrollToIndex(index) {
    if (!filterItems[index]) return;
    const container = filterScrollContainer;
    const item = filterItems[index];
    const containerRect = container.getBoundingClientRect();
    const itemRect = item.getBoundingClientRect();
    const scrollLeft = container.scrollLeft + (itemRect.left - containerRect.left) - (containerRect.width / 2) + (itemRect.width / 2);
    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
}

function setFilterIndex(newIndex, updateScroll = true) {
    if (newIndex === currentFilterIndex) return;
    currentFilterIndex = newIndex;
    filterItems.forEach((item, i) => {
        if (i === currentFilterIndex) item.classList.add('active');
        else item.classList.remove('active');
    });
    refreshPreview();
    if (updateScroll) scrollToIndex(currentFilterIndex);
}

// 滚动自动吸附
let scrollTimeout = null;
filterScrollContainer.addEventListener('scroll', () => {
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        const container = filterScrollContainer;
        const scrollLeft = container.scrollLeft;
        const containerWidth = container.clientWidth;
        let closestIndex = 0;
        let minDistance = Infinity;
        filterItems.forEach((item, idx) => {
            const itemCenter = item.offsetLeft + item.clientWidth / 2;
            const scrollCenter = scrollLeft + containerWidth / 2;
            const distance = Math.abs(itemCenter - scrollCenter);
            if (distance < minDistance) {
                minDistance = distance;
                closestIndex = idx;
            }
        });
        if (closestIndex !== currentFilterIndex) {
            setFilterIndex(closestIndex, false);
            scrollToIndex(closestIndex);
        }
    }, 80);
});

// 散光切换
function toggleGlowMode() {
    glowEnabled = !glowEnabled;
    if (glowEnabled) glowToggle.classList.add('active');
    else glowToggle.classList.remove('active');
    refreshPreview();
}
glowToggle.addEventListener('click', toggleGlowMode);
