<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 仿生相机 & 交互装置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #000;
            overflow-x: hidden;
            color: #f0f0f0;
        }

        /* 页面容器 */
        .page {
            width: 100%;
            min-height: 100vh;
            display: none;
            position: relative;
            background: #000;
        }
        .page.active-page {
            display: block;
        }

        /* 全局语言切换按钮 */
        .lang-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            z-index: 1000;
            cursor: pointer;
        }

        /* 主页 */
        .home-wrap {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: radial-gradient(circle at 30% 50%, #0a0f1a, #000000);
        }
        .btn {
            width: 260px;
            padding: 16px 0;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 60px;
            color: rgba(255,255,255,0.95);
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.96);
            background: white;
            color: black;
        }

        /* 相机页面样式 (保留完整功能) */
        .camera-wrap {
            width: 100%;
            height: 100vh;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top)+10px);
            left: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .shutter-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)+20px);
            left: calc(50% - 40px);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.25);
            z-index: 10;
            cursor: pointer;
        }
        .video-record-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)+20px);
            left: calc(50% + 60px);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ff3b30;
            border: 2px solid white;
            z-index: 10;
            cursor: pointer;
        }
        .zoom-control {
            position: absolute;
            bottom: max(130px, env(safe-area-inset-bottom)+110px);
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 20;
        }
        .record-timer {
            position: absolute;
            top: max(70px, env(safe-area-inset-top)+50px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffaa66;
            z-index: 10;
            display: none;
        }
        .focus-indicator {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .preview-wrap {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            padding: 20px;
        }
        .preview-img, .preview-video {
            max-width: 90%;
            max-height: 55vh;
            border-radius: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .filter-section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .filter-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
        }
        .filter-track {
            display: inline-flex;
            gap: 12px;
            padding: 0 20px;
        }
        .filter-item {
            display: inline-flex;
            padding: 10px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .glow-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 20px;
            margin: 10px auto;
            cursor: pointer;
            width: fit-content;
        }
        .filter-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            color: #eee;
        }

        /* ========= 项目介绍页 (动态背景 + 卡片半透明图片背景) ========= */
        .intro-page {
            background: radial-gradient(circle at 20% 30%, #0b101a, #03060c);
            position: relative;
            overflow-x: hidden;
            color: #f5f5f5;
        }
        /* 动态漂浮圆点 */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .drop {
            position: absolute;
            background: rgba(180, 200, 240, 0.2);
            border-radius: 50%;
            filter: blur(20px);
            animation: floatUpDown 14s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes floatUpDown {
            0% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-50px) scale(1.3); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 0.2; }
        }
        .intro-container {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }
        /* 左上角返回按钮 (与语言按钮不重叠) */
        .intro-back-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }
        .hero-intro {
            text-align: center;
            padding: 1rem 0 1rem;
        }
        .hero-intro h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0ffd8, #7cb8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* 走马灯 */
        .carousel-section {
            margin: 2.5rem 0;
            border-radius: 40px;
            background: rgba(15, 25, 35, 0.5);
            backdrop-filter: blur(8px);
            padding: 20px 0;
        }
        .carousel-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-track-container {
            width: 80%;
            overflow: hidden;
            border-radius: 28px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
        }
        .carousel-slide {
            flex: 0 0 100%;
            text-align: center;
        }
        .carousel-slide img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px black;
        }
        .carousel-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            border-radius: 60px;
            margin: 0 8px;
            width: 48px;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active {
            background: #7cffb2;
            width: 24px;
            border-radius: 8px;
        }
        /* 卡片网格 - 每个卡片背景为低透明度图片 */
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin: 2rem 0;
        }
        .spec-card {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        /* 卡片低透明度假背景图 (科技感纹理) - 全局默认 */
        .spec-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('0002.jpeg');
            background-repeat: repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: -1;
        }
        /* 不同卡片差异化图片 (低透明度) */
        .spec-card[data-blog="concept"]::before { background-image: url('0002.jpeg'); opacity: 0.12; }
        .spec-card[data-blog="mechanics"]::before { background-image: url('0003.jpeg'); opacity: 0.12; }
        .spec-card[data-blog="lighting"]::before { background-image: url('0001.jpeg'); opacity: 0.12; }
        .spec-card[data-blog="audio"]::before { background-image: url('0004.jpeg'); opacity: 0.12; }
        .spec-card[data-blog="control"]::before { background-image: url('0005.jpeg'); opacity: 0.12; }
        .spec-card[data-blog="challenge"]::before { background-image: url('0006.jpeg'); opacity: 0.12; }
        
        .spec-card:hover {
            transform: translateY(-8px);
            background: rgba(30, 45, 65, 0.8);
            border-color: #7cffb2;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }
        .tag {
            background: #2c5f6e;
            color: #f0f0f0;
            border-radius: 60px;
            padding: 4px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h3 {
            font-size: 1.6rem;
            margin: 0.5rem 0;
            color: #ffffff;
        }
        .spec-card p {
            color: #e0e0e0;
            line-height: 1.4;
        }
        .highlight {
            color: #a0ffc0;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .stat-badge {
            background: #1e3a3f;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #ddd;
        }
        footer {
            text-align: center;
            padding: 2.5rem;
            opacity: 0.7;
            color: #aaa;
        }
        /* 模态框 (博客细节) 文字左右对齐 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #11161f;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            border-radius: 36px;
            padding: 28px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.3);
            color: #f0f0f0;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            text-align: justify;
        }
        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #b9ffd0;
            text-align: left;
        }
        .modal-content p {
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .modal-close {
            background: #ff5e5e;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 800px) {
            .grid-2col { grid-template-columns: 1fr; }
            .hero-intro h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<button class="lang-btn" id="globalLangBtn">中文</button>

<!-- 主页 -->
<div id="homePage" class="page active-page">
    <div class="home-wrap">
        <button class="btn" id="enterCameraBtn">📷 Enter Camera</button>
        <button class="btn" id="introBtn">🌿 Project Intro · CreNature</button>
    </div>
</div>

<!-- 相机页面 -->
<div id="cameraPage" class="page">
    <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="record-timer" id="recordTimer">⏺ 0.0s</div>
        <div class="zoom-control" id="zoomControl">
            <span id="zoomLabel">ZOOM</span>
            <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="3" step="0.01" value="1">
            <span id="zoomValue">1.0x</span>
        </div>
        <div class="focus-indicator" id="focusIndicator"></div>
        <button class="back-btn" id="backHomeBtn">← Back</button>
        <button class="shutter-btn" id="shutterBtn"></button>
        <button class="video-record-btn" id="videoRecordBtn">🎥</button>
    </div>
</div>

<!-- 预览页面 -->
<div id="previewPage" class="page">
    <div class="preview-wrap">
        <img class="preview-img" id="previewImg" alt="Preview">
        <video class="preview-video" id="previewVideo" controls></video>
        <div class="filter-badge" id="filterBadge">Original</div>
        <div class="filter-section" id="filterSection">
            <div class="filter-scroll-container"><div class="filter-track" id="filterTrack"></div></div>
            <div class="glow-toggle" id="glowToggle"><span>✨</span><span id="glowLabel">Glow Mode</span></div>
        </div>
        <div class="preview-buttons" style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn" id="reTakeBtn" style="width:140px;">Retake</button>
            <button class="btn" id="downloadBtn" style="width:140px;">Download</button>
        </div>
        <button class="back-btn" id="backFromPreviewBtn">← Back</button>
    </div>
</div>

<!-- 项目介绍页面 -->
<div id="introPage" class="page intro-page">
    <div class="floating-bg" id="floatingBg"></div>
    <!-- 左上角返回按钮 -->
    <button id="introBackHomeBtn" class="intro-back-btn">🏠 Back to Home</button>
    <div class="intro-container" id="introDynamicContent"></div>
    <footer>CreNature — Redefining the interface between organisms and machines</footer>
</div>

<!-- 模态框 (博客详情) -->
<div id="blogModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
        <button class="modal-close" id="closeModalBtn">Close</button>
    </div>
</div>

<canvas id="captureCanvas" style="display: none;"></canvas>

                   zh: "## 仿生設計與結構哲學\n\n樹幹以3D列印空心製作，用於佈線。四組對稱機械臂（樹枝）每組擁有5個舵機。底部DS3218 (20kg·cm) 承載整個機械臂重量，中部MG996R (10kg·cm) 以及頂端三個SG90控制夾爪開合、旋轉與傾斜。所有電線經由樹幹內部通至基座。整體模仿自然樹木，同時嵌入複雜機電。" },
        mechanics: { en: "## Robotic Arms & Torque Management\n\nEach robotic arm has 5 servos: 1x DS3218 (base, 20kg·cm), 1x MG996R (middle, 10kg·cm), 3x SG90 (top, for gripper). The base motor handles the heaviest load. To prevent falling due to gravity, an intelligent safety algorithm limits the mid/upper servos when the base angle is below 70°, forcing them to fold inward. When above 75°, they extend outward to maintain balance. This dynamic compensation ensures stability.", 
                     zh: "## 機械臂與扭力管理\n\n每條機械臂有5個舵機：1個DS3218（底部，20kg·cm）、1個MG996R（中部，10kg·cm）、3個SG90（頂部，控制夾爪）。底部馬達承受最大負載。為防止重力掉落，智能安全邏輯在底部角度低於70°時限制中/上部舵機向內收折，高於75°時強制向外伸展以維持平衡，動態補償確保穩定性。" },
        lighting: { en: "## Lighting & Atmospheric Effects\n\n16 mini LEDs (5V with 330Ω resistors) are wrapped around the four arms, acting as aerial roots. Each LED is covered by colored cellophane flowers (pink, green, yellow, red), creating a stained glow. Three leaf materials: green cellophane, fluorescent origami, and silver craft leaves. The light interacts with these materials to produce iridescent reflections. Glow mode adds extra brightness for a magical aura.", 
                    zh: "## 燈光與氛圍效果\n\n16顆迷你LED（5V串聯330Ω電阻）纏繞在四條機械臂上，作為氣根。每顆LED包裹彩色玻璃紙花朵（粉、綠、黃、紅），產生染色光暈。三種葉片材質：綠色玻璃紙、螢光摺紙、銀色鐵絲葉。燈光與材質交互產生虹彩反射。散光模式增添額外亮度，營造奇幻氛圍。" },
        audio: { en: "## Audio Narrative & MP3 Control\n\nAn independent Arduino Nano controls the MP3 DS Player module via UART. Connected to an 8Ω 0.5W speaker. There are 7 tracks (the 7th is an easter egg). Short press the music button to switch tracks, long press to play (release to stop). Volume set to maximum. This creates an immersive soundscape that responds to user interaction, turning the installation into a storytelling device.", 
                 zh: "## 音樂敘事與MP3控制\n\n獨立的Arduino Nano通過UART控制MP3 DS Player模組，連接8Ω 0.5W喇叭。內置7首曲目（第七首為彩蛋）。短按音樂按鈕切換曲目，長按播放（鬆手停止），音量設為最大。這營造出沉浸式音景，使裝置成為說故事的工具。" },
        control: { en: "## Interactive Logic & Physical Buttons\n\nFive external buttons: Low (base), Mid, High (top), Reset, Music. \n- Long-press Low: base sweeps 55°–90° slowly.\n- Long-press Mid: middle sweeps 70°–120° slowly.\n- Long-press High: top servos move fast (opening/closing).\n- Combinations (e.g., Low+Mid) produce seaweed-like wavy motions.\n- Reset: returns all servos to origin.\nThe dynamic safety algorithm prevents mechanical conflict and cable tangling.", 
                   zh: "## 互動邏輯與實體按鍵\n\n五個外置按鈕：低部、中部、高部、重置、音樂。\n- 長按低部：底部在55°–90°緩慢擺動。\n- 長按中部：中部在70°–120°緩慢擺動。\n- 長按高部：頂部舵機快速開合。\n- 組合（如低+中）產生海草般波浪運動。\n- 重置：所有舵機回到初始角度。\n動態安全算法防止機械衝突與電線纏繞。" },
        challenge: { en: "## Engineering Challenges & Solutions\n\n1. **Power interference**: Charging bricks caused servo jitter → added 0.1µF capacitors across VCC/GND and 1kΩ resistors on signal lines, plus common ground.\n2. **Servo dead zone**: SG90 had erratic motion → increased step size from 1° to 2° and replaced defective units.\n3. **Gravity collapse**: Lower torque insufficient at certain angles → implemented angle-dependent constraint logic to dynamically adjust mid/upper limits.\n4. **Cable management**: All wires routed through hollow trunk and branches, reinforced with soldering and electrical tape.", 
                    zh: "## 工程挑戰與解決方案\n\n1. **電源干擾**：充電寶導致舵機抖動 → 在VCC/GND之間並聯0.1µF電容，信號線串聯1kΩ電阻，並強化共地。\n2. **舵機死區**：SG90動作卡頓 → 加大步長從1°到2°，更換不良舵機。\n3. **重力塌陷**：特定角度底部扭力不足 → 實現角度約束邏輯，動態調整中/上部極限。\n4. **線纜管理**：所有電線經由空心樹幹與樹枝內部，焊接加固並纏繞電工膠布。" }
    };

    let currentLang = "en";
    let carouselIndex = 0;
    let autoInterval = null;
    let mediaStream = null, isRecording = false, mediaRecorder, recordedChunks = [], videoTrack = null;

    // DOM 元素
    const homePage = document.getElementById('homePage');
    const cameraPage = document.getElementById('cameraPage');
    const previewPage = document.getElementById('previewPage');
    const introPage = document.getElementById('introPage');
    const videoElem = document.getElementById('video');
    const previewImg = document.getElementById('previewImg');
    const previewVideo = document.getElementById('previewVideo');
    const filterSectionDiv = document.getElementById('filterSection');
    const filterTrack = document.getElementById('filterTrack');
    const glowToggle = document.getElementById('glowToggle');
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');

    let currentMediaType = null, originalPhotoBlob = null, originalVideoBlob = null;
    let currentFilterIndex = 0, glowEnabled = false;

    const cameraI18n = {
        en: { back: "← Back", retake: "Retake", download: "Download", filters: ["Original","Mint","Rose","Cool White","Morandi","Amber","Lavender"], glow: "Glow Mode", videoNoFilter: "Video (No Filter)", zoom: "ZOOM" },
        zh: { back: "← 返回", retake: "重新拍攝", download: "下載", filters: ["原色","淺綠","淺粉","冷白","莫蘭迪","琥珀","紫羅蘭"], glow: "散光模式", videoNoFilter: "影片 (無濾鏡)", zoom: "焦距" }
    };

    // 动态背景
    function initFloatingDrops() {
        const container = document.getElementById('floatingBg');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < 40; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            const size = Math.random() * 100 + 30;
            drop.style.width = size + 'px';
            drop.style.height = size + 'px';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.top = Math.random() * 100 + '%';
            drop.style.animationDuration = 9 + Math.random() * 16 + 's';
            drop.style.animationDelay = Math.random() * 12 + 's';
            drop.style.background = `radial-gradient(circle, rgba(140,180,220,0.2), rgba(80,100,140,0.05))`;
            container.appendChild(drop);
        }
    }

    // 渲染项目介绍页面 (卡片内标签动态语言，所有统计标签动态)
    function renderIntroPage() {
        const t = i18nFull[currentLang];
        const container = document.getElementById('introDynamicContent');
        if (!container) return;
        container.innerHTML = `
            <div class="hero-intro">
                <h1>${t.heroTitle}</h1>
                <p style="font-size:1.2rem; margin-top:12px;">${t.heroSub}</p>
            </div>
            <div class="carousel-section" id="carouselSection">
                <h3 style="text-align:center;">${t.carouselTitle}</h3>
                <div class="carousel-wrapper">
                    <button class="carousel-btn" id="prevSlideBtn">❮</button>
                    <div class="carousel-track-container"><div class="carousel-track" id="carouselTrack"></div></div>
                    <button class="carousel-btn" id="nextSlideBtn">❯</button>
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
            <div class="grid-2col">
                <div class="spec-card" data-blog="concept"><div class="tag">${t.tags.concept}</div><h3>${t.conceptTitle}</h3><p>${t.conceptDetail}</p><div class="stats-row"><span class="stat-badge">20 Servos</span><span class="stat-badge">4 Arms</span></div></div>
                <div class="spec-card" data-blog="mechanics"><div class="tag">${t.tags.mechanics}</div><h3>${t.mechTitle}</h3><p>${t.mechDetail}</p><div class="stats-row"><span class="stat-badge">DS3218 20kg·cm</span><span class="stat-badge">MG996R</span></div></div>
                <div class="spec-card" data-blog="lighting"><div class="tag">${t.tags.lighting}</div><h3>${t.lightTitle}</h3><p>${t.lightDetail}</p><div class="stats-row"><span class="stat-badge">16 LEDs</span><span class="stat-badge">${t.statLabels.cellophaneRoots}</span></div></div>
                <div class="spec-card" data-blog="audio"><div class="tag">${t.tags.audio}</div><h3>${t.audioTitle}</h3><p>${t.audioDetail}</p></div>
                <div class="spec-card" data-blog="control"><div class="tag">${t.tags.control}</div><h3>${t.controlTitle}</h3><p>${t.controlDetail}</p><div class="stats-row"><span class="stat-badge">${t.statLabels.combo}</span><span class="stat-badge">${t.statLabels.dynamicBalance}</span></div></div>
                <div class="spec-card" data-blog="challenge"><div class="tag">${t.tags.challenge}</div><h3>${t.challengeTitle}</h3><p>${t.challengePoints}</p><div class="stats-row"><span class="stat-badge">${t.statLabels.commonGround}</span><span class="stat-badge">${t.statLabels.gravityComp}</span></div></div>
            </div>
            <div class="spec-card" style="text-align:center; background:rgba(0,0,0,0.5);">
                <p style="font-size:1.1rem;">${t.specs}</p>
                <p style="margin-top:1rem; font-style:italic;">✨ ${t.conclusion}</p>
            </div>
        `;
        // 绑定卡片点击事件（博客弹窗）
        document.querySelectorAll('.spec-card[data-blog]').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const blogKey = card.getAttribute('data-blog');
                showBlogModal(blogKey);
            });
        });
        buildCarouselDOM(t.slides);
        startAutoScrollCarousel();
    }

    function buildCarouselDOM(slideLabels) {
        const galleryImages = [
            "0002.jpeg", "0003.jpeg",
            "0001.jpeg", "0004.jpeg",
            "0005.jpeg", "0006.jpeg"
        ];
        const track = document.getElementById('carouselTrack');
        const dotsContainer = document.getElementById('carouselDots');
        if (!track) return;
        track.innerHTML = '';
        galleryImages.forEach((src, idx) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'carousel-slide';
            slideDiv.innerHTML = `<img src="${src}" alt="gallery" loading="lazy"><p style="margin-top:12px;">${slideLabels[idx]}</p>`;
            track.appendChild(slideDiv);
        });
        const total = galleryImages.length;
        function updateCarouselUI() {
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            if (dotsContainer) {
                dotsContainer.innerHTML = '';
                for (let i = 0; i < total; i++) {
                    const dot = document.createElement('div');
                    dot.className = `dot ${i === carouselIndex ? 'active' : ''}`;
                    dot.addEventListener('click', () => { carouselIndex = i; updateCarouselUI(); resetAutoScroll(); });
                    dotsContainer.appendChild(dot);
                }
            }
        }
        window.updateCarouselUI = updateCarouselUI;
        document.getElementById('prevSlideBtn')?.addEventListener('click', () => { carouselIndex = (carouselIndex - 1 + total) % total; updateCarouselUI(); resetAutoScroll(); });
        document.getElementById('nextSlideBtn')?.addEventListener('click', () => { carouselIndex = (carouselIndex + 1) % total; updateCarouselUI(); resetAutoScroll(); });
        updateCarouselUI();
    }

    function startAutoScrollCarousel() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (introPage.classList.contains('active-page')) {
                carouselIndex = (carouselIndex + 1) % 6;
                if (window.updateCarouselUI) window.updateCarouselUI();
            }
        }, 4500);
    }
    function resetAutoScroll() { if (autoInterval) { clearInterval(autoInterval); startAutoScrollCarousel(); } }

    // 博客模态框
    function showBlogModal(key) {
        const modal = document.getElementById('blogModal');
        const titleEl = document.getElementById('modalTitle');
        const bodyEl = document.getElementById('modalBody');
        const detail = blogDetails[key];
        if (!detail) return;
        const content = currentLang === 'en' ? detail.en : detail.zh;
        const titleMap = {
            concept: currentLang === 'en' ? "Biomimetic Design" : "仿生設計",
            mechanics: currentLang === 'en' ? "Robotic Mechanics" : "機械結構",
            lighting: currentLang === 'en' ? "Lighting & Atmosphere" : "燈光氛圍",
            audio: currentLang === 'en' ? "Audio Narrative" : "音樂敘事",
            control: currentLang === 'en' ? "Interactive Logic" : "互動邏輯",
            challenge: currentLang === 'en' ? "Engineering Challenges" : "工程挑戰"
        };
        titleEl.textContent = titleMap[key] || "Details";
        bodyEl.innerHTML = content.replace(/\n/g, '<br>');
        modal.style.display = 'flex';
    }
    function closeModal() { document.getElementById('blogModal').style.display = 'none'; }

    // 相机核心功能 (精简但完整)
    async function initCamera() {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" }, width: { ideal: 3840 }, height: { ideal: 2160 } } });
            mediaStream = stream;
            videoElem.srcObject = stream;
            await videoElem.play();
            videoTrack = stream.getVideoTracks()[0];
            setupZoomFocus();
            return true;
        } catch (e) { alert("Camera permission needed"); return false; }
    }
    function setupZoomFocus() {
        if (!videoTrack) return;
        const caps = videoTrack.getCapabilities();
        if (caps.zoom && caps.zoom.max > 1) {
            const slider = document.getElementById('zoomSlider');
            slider.min = caps.zoom.min || 1; slider.max = caps.zoom.max; slider.step = 0.01;
            slider.value = 1;
            slider.oninput = () => { videoTrack.applyConstraints({ advanced: [{ zoom: parseFloat(slider.value) }] }); document.getElementById('zoomValue').innerText = slider.value.toFixed(2) + 'x'; };
        }
        videoElem.onclick = (e) => {
            const rect = videoElem.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width, y = (e.clientY - rect.top) / rect.height;
            const indicator = document.getElementById('focusIndicator');
            indicator.style.left = e.clientX + 'px'; indicator.style.top = e.clientY + 'px';
            indicator.style.opacity = '1'; setTimeout(() => indicator.style.opacity = '0', 300);
            videoTrack.applyConstraints({ advanced: [{ pointsOfInterest: [{ x, y }] }] }).catch(() => {});
        };
    }
    async function takePhoto() {
        if (!videoElem.videoWidth) return;
        canvas.width = videoElem.videoWidth; canvas.height = videoElem.videoHeight;
        ctx.drawImage(videoElem, 0, 0);
        canvas.toBlob(async blob => {
            currentMediaType = 'photo'; originalPhotoBlob = blob; originalVideoBlob = null;
            currentFilterIndex = 0; glowEnabled = false; glowToggle.classList.remove('active');
            filterSectionDiv.style.display = 'flex';
            await applyFilterToPhoto();
            cameraPage.style.display = 'none'; previewPage.style.display = 'flex';
            updateFilterBadge();
        }, 'image/jpeg', 0.95);
    }
    async function applyFilterToPhoto() { if (originalPhotoBlob) { const url = URL.createObjectURL(originalPhotoBlob); previewImg.src = url; previewImg.style.display = 'block'; previewVideo.style.display = 'none'; } }
    function updateFilterBadge() { const badge = document.getElementById('filterBadge'); if (currentMediaType === 'photo') badge.innerText = cameraI18n[currentLang].filters[currentFilterIndex] + (glowEnabled ? ' ✨' : ''); else badge.innerText = cameraI18n[currentLang].videoNoFilter; }
    function startRecording() { if (!mediaStream) return; recordedChunks = []; mediaRecorder = new MediaRecorder(mediaStream); mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(recordedChunks, { type: 'video/mp4' }); currentMediaType = 'video'; originalVideoBlob = blob; filterSectionDiv.style.display = 'none'; document.getElementById('filterBadge').innerText = cameraI18n[currentLang].videoNoFilter; previewVideo.src = URL.createObjectURL(blob); previewVideo.style.display = 'block'; previewImg.style.display = 'none'; cameraPage.style.display = 'none'; previewPage.style.display = 'flex'; }; mediaRecorder.start(); isRecording = true; document.getElementById('videoRecordBtn').classList.add('recording'); setTimeout(() => { if (isRecording) stopRecording(); }, 3000); }
    function stopRecording() { if (mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false; document.getElementById('videoRecordBtn').classList.remove('recording'); } }
    function rebuildFilters() { const filters = cameraI18n[currentLang].filters; filterTrack.innerHTML = ''; filters.forEach((name, idx) => { const div = document.createElement('div'); div.className = 'filter-item'; div.innerText = name; if (idx === currentFilterIndex) div.classList.add('active'); div.onclick = async () => { currentFilterIndex = idx; document.querySelectorAll('.filter-item').forEach((el, i) => el.classList.toggle('active', i === idx)); if (currentMediaType === 'photo' && originalPhotoBlob) await applyFilterToPhoto(); updateFilterBadge(); }; filterTrack.appendChild(div); }); }

    // 全局语言切换
    function updateAllUI() {
        const tCam = cameraI18n[currentLang];
        document.getElementById('backHomeBtn').textContent = tCam.back;
        document.getElementById('backFromPreviewBtn').textContent = tCam.back;
        document.getElementById('reTakeBtn').textContent = tCam.retake;
        document.getElementById('downloadBtn').textContent = tCam.download;
        document.getElementById('glowLabel').textContent = tCam.glow;
        document.getElementById('zoomLabel').textContent = tCam.zoom;
        document.getElementById('globalLangBtn').textContent = currentLang === 'en' ? '中文' : 'English';
        document.getElementById('enterCameraBtn').textContent = currentLang === 'en' ? '📷 Enter Camera' : '📷 進入相機';
        document.getElementById('introBtn').textContent = currentLang === 'en' ? '🌿 Project Intro · CreNature' : '🌿 項目介紹 · CreNature';
        rebuildFilters();
        if (introPage.classList.contains('active-page')) renderIntroPage();
    }

    function setActivePage(page) {
        [homePage, cameraPage, previewPage, introPage].forEach(p => { p.classList.remove('active-page'); p.style.display = 'none'; });
        page.classList.add('active-page'); page.style.display = 'block';
        if (page === introPage) { initFloatingDrops(); renderIntroPage(); startAutoScrollCarousel(); }
        if (page === cameraPage && !mediaStream) initCamera();
    }

    // 事件绑定
    document.getElementById('enterCameraBtn').onclick = () => setActivePage(cameraPage);
    document.getElementById('introBtn').onclick = () => setActivePage(introPage);
    document.getElementById('introBackHomeBtn').onclick = () => setActivePage(homePage);
    document.getElementById('backHomeBtn').onclick = () => { if (mediaStream) mediaStream.getTracks().forEach(t => t.stop()); setActivePage(homePage); };
    document.getElementById('backFromPreviewBtn').onclick = () => setActivePage(cameraPage);
    document.getElementById('shutterBtn').onclick = takePhoto;
    document.getElementById('videoRecordBtn').onclick = () => { if (isRecording) stopRecording(); else startRecording(); };
    document.getElementById('reTakeBtn').onclick = () => setActivePage(cameraPage);
    document.getElementById('downloadBtn').onclick = () => { if (currentMediaType === 'photo' && previewImg.src) { const a = document.createElement('a'); a.href = previewImg.src; a.download = 'photo.jpg'; a.click(); } else if (originalVideoBlob) { const a = document.createElement('a'); a.href = URL.createObjectURL(originalVideoBlob); a.download = 'video.mp4'; a.click(); } };
    glowToggle.onclick = () => { if (currentMediaType === 'photo') { glowEnabled = !glowEnabled; glowToggle.classList.toggle('active', glowEnabled); updateFilterBadge(); if (originalPhotoBlob) applyFilterToPhoto(); } };
    document.getElementById('globalLangBtn').onclick = () => { currentLang = currentLang === 'en' ? 'zh' : 'en'; updateAllUI(); if (introPage.classList.contains('active-page')) renderIntroPage(); };
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('blogModal').onclick = (e) => { if (e.target === document.getElementById('blogModal')) closeModal(); };

    updateAllUI();
    setActivePage(homePage);
    initFloatingDrops();
</script>
</body>
</html>
