<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>CreNature | 机械艺术树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;
            color: #fff;
        }

        /* 背景粒子画布 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* 提示文字 */
        .hint-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35);
            z-index: 10;
            pointer-events: none;
            animation: hintBreathe 2.5s ease-in-out infinite;
            transition: opacity 1.2s ease;
        }

        @keyframes hintBreathe {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.7; }
        }

        /* 流苏流光光点 */
        .flow-light {
            position: fixed;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, rgba(200, 230, 255, 0.6) 70%, transparent 100%);
            box-shadow: 0 0 30px 12px rgba(180, 220, 255, 0.5);
            z-index: 5;
            pointer-events: none;
            animation: flowLightAnim 2.2s ease-in-out infinite;
        }

        @keyframes flowLightAnim {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.85); opacity: 0.75; }
        }

        /* 三点连线 */
        .line-connect {
            position: fixed;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 230, 255, 0.6), transparent);
            transform-origin: left center;
            z-index: 4;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 全息机械树 */
        .holo-tree {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            max-width: 85vw;
            max-height: 85vh;
            z-index: 3;
            opacity: 0;
            filter: drop-shadow(0 0 18px rgba(160, 210, 255, 0.75))
                    drop-shadow(0 0 40px rgba(120, 180, 255, 0.4));
            transition: opacity 1.5s ease, transform 1.2s ease;
        }

        /* 解锁波纹 */
        .unlock-ripple {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(200, 230, 255, 0.5);
            z-index: 6;
            pointer-events: none;
            animation: rippleExpand 1.5s ease-out forwards;
        }

        @keyframes rippleExpand {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 600px; height: 600px; opacity: 0; }
        }

        /* 作品介绍浮窗 */
        .intro-card {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            padding: 20px 26px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            z-index: 20;
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.2s ease;
        }

        .intro-card h2 {
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        .intro-card p {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.55);
        }
    </style>
</head>
<body>
    <!-- 背景粒子画布 -->
    <canvas id="bgCanvas"></canvas>

    <!-- 提示文字 -->
    <div class="hint-text">触碰荧幕，唤醒光源</div>

    <!-- 全息机械树 已绑定你的文件名 -->
    <img src="CreNature_Transparent.png" class="holo-tree" alt="CreNature 机械艺术树" />

    <!-- 作品介绍卡片 -->
    <div class="intro-card">
        <h2>CreNature · 机械共生艺术树</h2>
        <p>由4支机械臂、20个伺服舵机构成关节骨架，结合银色荧光肌理、半透明玻璃质感花叶与内置灯光系统。机械结构与自然形态共生，以科技重构自然生长的韵律，每一处关节皆可通过交互控制实现姿态流转。</p>
    </div>

    <script>
        // ========== 背景星空粒子 ==========
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        let particles = [];

        function resizeCanvas() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.r = Math.random() * 1.2 + 0.2;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
                this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h;
                if (this.y > h) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(210, 235, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 120; i++) {
            particles.push(new Particle());
        }

        function animateParticle() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticle);
        }
        animateParticle();

        // ========== 交互逻辑 ==========
        const hintText = document.querySelector('.hint-text');
        const holoTree = document.querySelector('.holo-tree');
        const introCard = document.querySelector('.intro-card');

        let lightPoints = [];
        let lineElements = [];
        let unlocked = false;

        // 点击生成流苏流光
        document.addEventListener('click', e => {
            if (unlocked) return;
            const light = document.createElement('div');
            light.className = 'flow-light';
            light.style.left = `${e.clientX - 13}px`;
            light.style.top = `${e.clientY - 13}px`;
            document.body.appendChild(light);
            lightPoints.push({ el: light, x: e.clientX, y: e.clientY });

            // 凑够3个触发解锁
            if (lightPoints.length >= 3) {
                drawConnectLines();
                setTimeout(unlockAll, 800);
            }
        });

        // 三点连线
        function drawConnectLines() {
            for (let i = 0; i < 3; i++) {
                const next = (i + 1) % 3;
                const p1 = lightPoints[i];
                const p2 = lightPoints[next];

                const line = document.createElement('div');
                line.className = 'line-connect';

                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                line.style.left = `${p1.x}px`;
                line.style.top = `${p1.y}px`;
                line.style.width = `${len}px`;
                line.style.transform = `rotate(${angle}deg)`;
                line.style.opacity = '1';

                document.body.appendChild(line);
                lineElements.push(line);
            }
        }

        // 解锁全站
        function unlockAll() {
            unlocked = true;
            hintText.style.opacity = 0;

            // 解锁波纹
            const ripple = document.createElement('div');
            ripple.className = 'unlock-ripple';
            document.body.appendChild(ripple);

            // 全息树浮现 + 呼吸微动
            holoTree.style.opacity = 1;
            holoTree.style.transform = 'translate(-50%, -50%) scale(1)';

            // 介绍卡片滑入
            setTimeout(() => {
                introCard.style.opacity = 1;
                introCard.style.transform = 'translateX(-50%) translateY(0)';
            }, 600);
        }

        // 解锁后 鼠标/触屏 视差跟随（巨丝滑）
        document.addEventListener('mousemove', e => {
            if (!unlocked) return;
            const mx = (e.clientX / window.innerWidth - 0.5) * 12;
            const my = (e.clientY / window.innerHeight - 0.5) * 12;
            holoTree.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px)) scale(1)`;
        });

        // 移动端触摸滑动视差
        document.addEventListener('touchmove', e => {
            if (!unlocked) return;
            const touch = e.touches[0];
            const mx = (touch.clientX / window.innerWidth - 0.5) * 12;
            const my = (touch.clientY / window.innerHeight - 0.5) * 12;
            holoTree.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px)) scale(1)`;
        });
    </script>
</body>
</html>
