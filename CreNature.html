<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
            /* 禁止选中 / 禁止长按复制 */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            /* 完全锁死，不滑动、不被遮挡 */
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 语言切换按钮（全局右上角） */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 999;
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            letter-spacing: 1px;
        }
        .btn:disabled {
            opacity: 0.35;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 14px;
            z-index: 10;
        }
        .shutter-btn {
            position: absolute;
            bottom: max(80px, env(safe-area-inset-bottom) + 40px);
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            z-index: 10;
        }

        /* 预览照片页面 */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            gap: 40px;
        }
        .preview-img {
            width: 70%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            object-fit: contain;
        }
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 隐藏抓拍画布 */
        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 照片预览页面 -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开"
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let captureUrl = '';

// 语言切换
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
}

langToggleBtn.addEventListener('click', () => {
    updateLanguage(currentLang === "en" ? "zh" : "en");
});

// 进入相机
enterCameraBtn.addEventListener('click', async () => {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            },
            audio: false
        });
        video.srcObject = mediaStream;
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch (err) {
        alert(i18n[currentLang].alertPermission);
    }
});

// 拍照
shutterBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    captureUrl = canvas.toDataURL('image/png');

    previewImg.src = captureUrl;
    cameraPage.style.display = 'none';
    previewPage.style.display = 'flex';
});

// 重拍
reTakeBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
});

// 修复下载功能（兼容所有浏览器/手机）
downloadBtn.addEventListener('click', () => {
    if (!captureUrl) return;
    
    const a = document.createElement('a');
    a.href = captureUrl;
    a.download = 'CreNature_Photo.png';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
        document.body.removeChild(a);
    }, 100);
});

// 返回首页
backHomeBtn.addEventListener('click', () => {
    stopCamera();
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

backFromPreviewBtn.addEventListener('click', () => {
    stopCamera();
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 统一停止相机
function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
}

// 初始化
updateLanguage('en');
</script>
</body>
</html>
