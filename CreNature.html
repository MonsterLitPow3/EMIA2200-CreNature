<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 语言切换按钮（全局右上角） */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 999;
        }

        /* 首页 */
        .home-wrap {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            letter-spacing: 1px;
        }
        .btn:disabled {
            opacity: 0.35;
        }

        /* 相机页面 - 修复底部遮挡，加安全边距 */
        .camera-wrap {
            width: 100vw;
            height: 100vh;
            display: none;
            position: relative;
            /* 给底部预留安全边距，避开手机导航栏 */
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 14px;
        }
        .shutter-btn {
            position: absolute;
            /* 按钮上移，避开底部导航栏 */
            bottom: max(60px, env(safe-area-inset-bottom) + 20px);
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
        }
        .confirm-shot-btn {
            position: absolute;
            bottom: max(140px, env(safe-area-inset-bottom) + 100px);
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.25);
            color: #fff;
            display: none;
        }

        /* 预览照片页面 */
        .preview-wrap {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: max(60px, env(safe-area-inset-top) + 20px);
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            gap: 40px;
        }
        .preview-img {
            width: 70%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 隐藏抓拍画布 */
        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<!-- 全局语言切换按钮 -->
<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
    <button class="confirm-shot-btn" id="confirmShotBtn">Confirm This Photo</button>
</div>

<!-- 照片预览页面 -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<!-- 隐藏抓拍画布 -->
<canvas id="captureCanvas"></canvas>

<script>
// 多语言文本配置
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        confirmShotBtn: "Confirm This Photo",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        confirmShotBtn: "确认满意这张照片",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开"
    }
};

let currentLang = "en"; // 默认英文

// 页面元素
const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');
const confirmShotBtn = document.getElementById('confirmShotBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let captureUrl = '';

// 语言切换函数
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    confirmShotBtn.textContent = texts.confirmShotBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
}

// 绑定语言切换事件
langToggleBtn.addEventListener('click', () => {
    const newLang = currentLang === "en" ? "zh" : "en";
    updateLanguage(newLang);
});

// 进入相机
enterCameraBtn.addEventListener('click', async () => {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false
        });
        video.srcObject = mediaStream;
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
        confirmShotBtn.style.display = 'none';
    } catch (err) {
        alert(i18n[currentLang].alertPermission);
    }
});

// 快门拍照（修复：定格画面，留在相机页）
shutterBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    captureUrl = canvas.toDataURL('image/png');
    confirmShotBtn.style.display = 'block';
});

// 确认照片 进入预览页
confirmShotBtn.addEventListener('click', () => {
    previewImg.src = captureUrl;
    cameraPage.style.display = 'none';
    previewPage.style.display = 'flex';
});

// 重新拍照
reTakeBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    confirmShotBtn.style.display = 'none';
});

// 下载照片（纯前端直接下载，不存后台）
downloadBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = captureUrl;
    a.download = 'CreNature_Photo.png';
    a.click();
});

// 相机页返回首页
backHomeBtn.addEventListener('click', () => {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 预览页返回
backFromPreviewBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
});
</script>

</body>
</html>
