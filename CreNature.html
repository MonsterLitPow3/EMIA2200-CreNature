<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 全局按钮按下的白底黑字特效 */
        .lang-btn:active,
        .btn:active,
        .back-btn:active,
        .shutter-btn:active {
            background: white !important;
            color: black !important;
            border-color: white !important;
        }
        .shutter-btn:active {
            transform: translateX(-50%) scale(0.94);
        }

        /* 语言切换按钮 */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        
        /* 快门按钮 - 确保远离底部应用栏 */
        .shutter-btn {
            position: absolute;
            bottom: max(90px, calc(env(safe-area-inset-bottom) + 65px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.08s linear;
        }

        /* ========= 预览页面 - 彻底解决底部应用栏遮挡 ========= */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;      /* 禁止任何滚动 */
            padding: 0 20px;
            /* 关键：增大底部内边距，确保按钮完全高于应用栏 */
            padding-top: max(70px, env(safe-area-inset-top) + 20px);
            padding-bottom: max(70px, calc(env(safe-area-inset-bottom) + 85px));
            box-sizing: border-box;
        }
        
        /* 预览图片 - 限制最大高度，确保按钮区域不被挤压 */
        .preview-img {
            max-width: 90%;
            max-height: 50vh;
            width: auto;
            height: auto;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin-bottom: 24px;
        }
        
        /* 按钮区域 - 使用flex列，居中对齐，不受底部影响 */
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
            margin: 0;
        }
        
        .preview-buttons .btn {
            width: 240px;
        }
        
        /* 预览页左上角返回按钮固定定位，避免被覆盖 */
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }
        
        /* 极小屏幕适配：图片适当再缩小，确保所有按钮可见 */
        @media (max-width: 480px) and (max-height: 700px) {
            .preview-img {
                max-height: 42vh;
                margin-bottom: 16px;
            }
            .preview-buttons {
                gap: 15px;
            }
            .preview-wrap {
                padding-bottom: max(70px, calc(env(safe-area-inset-bottom) + 80px));
            }
        }
        
        /* 针对较矮屏幕（如折叠屏）额外增强 */
        @media (max-height: 600px) {
            .preview-img {
                max-height: 38vh;
            }
            .preview-buttons .btn {
                padding: 12px 0;
                width: 210px;
            }
        }

        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 照片预览页面（无滚动，底部按钮完全显示） -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开"
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let capturedBlobUrl = null;      // 存储blob URL用于下载

// 语言切换
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
}

langToggleBtn.addEventListener('click', () => {
    updateLanguage(currentLang === "en" ? "zh" : "en");
});

// 进入相机
enterCameraBtn.addEventListener('click', async () => {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            },
            audio: false
        });
        video.srcObject = mediaStream;
        await new Promise((resolve) => {
            if (video.readyState >= 2) resolve();
            else video.onloadeddata = () => resolve();
        });
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch (err) {
        console.warn(err);
        alert(i18n[currentLang].alertPermission);
    }
});

// 拍照：生成 blob 和预览图
async function capturePhoto() {
    if (!video.videoWidth || !video.videoHeight) return false;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const previewDataUrl = canvas.toDataURL('image/png');
    previewImg.src = previewDataUrl;
    
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    
    return new Promise((resolve) => {
        canvas.toBlob((blob) => {
            if (blob) {
                capturedBlobUrl = URL.createObjectURL(blob);
                resolve(true);
            } else {
                capturedBlobUrl = previewDataUrl; // 降级
                resolve(true);
            }
        }, 'image/png');
    });
}

shutterBtn.addEventListener('click', async () => {
    if (!video.videoWidth) {
        await new Promise(r => setTimeout(r, 80));
        if (!video.videoWidth) return;
    }
    const success = await capturePhoto();
    if (success) {
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
    }
});

// 重拍
reTakeBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    if (mediaStream && mediaStream.active && video.srcObject) {
        video.play().catch(e => console.warn);
    }
});

// 下载：完美支持 iPhone/iPad/Android/电脑
function triggerDownload(url, filename) {
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 200);
}

downloadBtn.addEventListener('click', () => {
    if (!capturedBlobUrl) {
        // 如果没有捕获的图片，尝试从当前 canvas 重新生成
        if (canvas.width && canvas.height) {
            canvas.toBlob((blob) => {
                if (blob) {
                    const tempUrl = URL.createObjectURL(blob);
                    triggerDownload(tempUrl, `CreNature_${Date.now()}.png`);
                    setTimeout(() => URL.revokeObjectURL(tempUrl), 300);
                } else {
                    alert("Photo not ready, please retake.");
                }
            }, 'image/png');
        } else {
            alert("No photo captured. Please take a photo first.");
        }
        return;
    }
    triggerDownload(capturedBlobUrl, `CreNature_${Date.now()}.png`);
});

// 返回首页（相机页）
backHomeBtn.addEventListener('click', () => {
    stopCamera();
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 预览页返回首页
backFromPreviewBtn.addEventListener('click', () => {
    stopCamera();
    if (capturedBlobUrl) {
        URL.revokeObjectURL(capturedBlobUrl);
        capturedBlobUrl = null;
    }
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
});

function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (video.srcObject) video.srcObject = null;
}

window.addEventListener('beforeunload', () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
});

updateLanguage('en');
</script>
</body>
</html>
