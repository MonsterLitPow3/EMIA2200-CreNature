<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 仿生相機 & 交互裝置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            color: #f0f0f0;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .intro-page {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .page.active-page {
            display: block;
        }

        .lang-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            z-index: 1000;
            cursor: pointer;
        }

        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: radial-gradient(circle at 30% 50%, #0a0f1a, #000000);
        }
        .btn {
            width: 260px;
            padding: 16px 0;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 60px;
            color: rgba(255,255,255,0.95);
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.96);
            background: white;
            color: black;
        }

        .intro-page {
            background: radial-gradient(circle at 20% 30%, #0b101a, #03060c);
            color: #f5f5f5;
        }
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .drop {
            position: absolute;
            background: rgba(180, 200, 240, 0.2);
            border-radius: 50%;
            filter: blur(20px);
            will-change: transform;
            pointer-events: none;
        }
        .intro-container {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            margin: 0 auto;
            padding: 4rem 1.5rem 5rem; /* 頂部間距加大，解決標題貼太近 */
        }
        .intro-back-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }
        .hero-intro {
            text-align: center;
            padding: 2rem 0 1rem; /* 增加內間距 */
        }
        .hero-intro h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0ffd8, #7cb8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .carousel-section {
            margin: 2.5rem 0;
            border-radius: 40px;
            background: rgba(15, 25, 35, 0.5);
            backdrop-filter: blur(8px);
            padding: 20px 0;
        }
        .carousel-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-track-container {
            width: 80%;
            overflow: hidden;
            border-radius: 28px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            will-change: transform;
        }
        .carousel-slide {
            flex: 0 0 100%;
            text-align: center;
        }
        .carousel-slide img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px black;
        }
        .carousel-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            border-radius: 60px;
            margin: 0 8px;
            width: 48px;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active {
            background: #7cffb2;
            width: 24px;
            border-radius: 8px;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin: 2rem 0;
        }
        .spec-card {
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        .spec-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBmaWxsPSIjZmZmIiBkPSJNMjAgM0wxIDM3bDE5LTQgMTkgNC0xOS0zNHoiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
        .spec-card[data-blog="concept"]::before { background-image: url('0002.jpg'); background-size: cover; opacity: 0.12; }
        .spec-card[data-blog="mechanics"]::before { background-image: url('0003.jpeg'); background-size: cover; opacity: 0.12; }
        .spec-card[data-blog="lighting"]::before { background-image: url('0001.jpg'); background-size: cover; opacity: 0.12; }
        .spec-card[data-blog="audio"]::before { background-image: url('0004.jpeg'); background-size: cover; opacity: 0.12; }
        .spec-card[data-blog="control"]::before { background-image: url('0005.jpg'); background-size: cover; opacity: 0.12; }
        .spec-card[data-blog="challenge"]::before { background-image: url('0006.jpeg'); background-size: cover; opacity: 0.12; }
        .spec-card:hover {
            transform: translateY(-8px);
            background: rgba(30, 45, 65, 0.8);
            border-color: #7cffb2;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }
        .tag {
            background: #2c5f6e;
            color: #f0f0f0;
            border-radius: 60px;
            padding: 4px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h3 {
            font-size: 1.6rem;
            margin: 0.5rem 0;
            color: #ffffff;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .stat-badge {
            background: #1e3a3f;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #ddd;
        }
        footer {
            text-align: center;
            padding: 2.5rem;
            opacity: 0.7;
            color: #aaa;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #11161f;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            border-radius: 36px;
            padding: 28px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.3);
            color: #f0f0f0;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            text-align: justify;
        }
        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #b9ffd0;
            text-align: left;
        }
        .modal-close {
            background: #ff5e5e;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 800px) {
            .grid-2col { grid-template-columns: 1fr; }
            .hero-intro h1 { font-size: 2rem; }
            .carousel-btn { width: 36px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<button class="lang-btn" id="globalLangBtn">中文</button>

<!-- 主頁 -->
<div id="homePage" class="page active-page">
    <div class="home-wrap">
        <button class="btn" id="enterCameraBtn">📷 Enter Camera</button>
        <button class="btn" id="introBtn">🌿 Project Intro · CreNature</button>
    </div>
</div>

<!-- 項目介紹頁面 -->
<div id="introPage" class="page intro-page">
    <div class="floating-bg" id="floatingBg"></div>
    <button id="introBackHomeBtn" class="intro-back-btn">🏠 Back to Home</button>
    <div class="intro-container" id="introDynamicContent"></div>
    <footer>CreNature — Redefining the interface between organisms and machines</footer>
</div>

<!-- 模態框 -->
<div id="blogModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
        <button class="modal-close" id="closeModalBtn">Close</button>
    </div>
</div>

<script>
    // ======================= 國際化 (英文+繁體中文) =======================
    const i18nFull = {
        en: {
            heroTitle: "CreNature: Bionic Installation",
            heroSub: "Redefining the relationship between organisms and machines",
            carouselTitle: "📸 Physical Gallery",
            tags: { concept: "🌿 Biomimetic", mechanics: "⚙️ Mechanics", lighting: "💡 Lighting", audio: "🎵 Audio Narrative", control: "🎮 Interaction", challenge: "⚠️ Engineering" },
            conceptTitle: "Biomimetic Design",
            conceptDetail: "Inspired by natural trees, four symmetrical robotic arms simulate branches. 20 servos + 16 LEDs + MP3 create a symbiotic dialogue.",
            mechTitle: "Robotic Arms & Torque",

            challengeTitle: "Challenges & Solutions",
            challengePoints: "⚡ Power interference: capacitors + common ground. 🔧 Servo dead zone: step size optimization. ⚖️ Gravity safety: angle-proportional constraints.",
            specs: "⚙️ 20 servos · 🎛️ 6 independent power supplies · 💡 16 LEDs · 🎵 MP3 module",
            conclusion: "CreNature realizes symbiotic interaction — machines become partners.",
            slides: ["Tree overview", "Servo details", "Electronics bay", "Button panel", "Light bloom", "3D printed trunk"],
            statLabels: { combo: "5-button combo", dynamicBalance: "Dynamic balance", commonGround: "Common ground+capacitor", gravityComp: "Gravity compensation", cellophaneRoots: "Soft Glass Paper + aerial roots" }
        },
        zh: {
            heroTitle: "CreNature：仿生交互裝置",
            heroSub: "重新定義生物與機械的關係",
            carouselTitle: "📸 實體裝置圖庫",
            tags: { concept: "🌿 仿生設計", mechanics: "⚙️ 機械結構", lighting: "💡 光影氛圍", audio: "🎵 音樂敘事", control: "🎮 互動邏輯", challenge: "⚠️ 工程突破" },
            conceptTitle: "仿生設計理念",
            conceptDetail: "以自然樹木為靈感，四組對稱機械臂模擬樹枝。20個舵機+16顆LED，構建人機共生對話。",
            mechTitle: "機械臂與扭矩",
            mechDetail: "底部DS3218 (20kg·cm)，中部MG996R (10kg·cm)，上部3x SG90。智能重力補償防止墜落。",
            lightTitle: "燈光與氛圍",
            lightDetail: "16顆迷你LED包裹彩色玻璃紙花朵，模擬氣根。散光模式與葉片產生虹彩反射。",
            audioTitle: "音樂敘事",
            audioDetail: "MP3模組內置7首曲目（第七首彩蛋）。長按播放，短按切換。沉浸式背景音樂。",
            controlTitle: "互動邏輯",
            controlDetail: "5個實體按鍵：低/中/高部、重置、音樂。組合長按產生海草般搖曳姿態。動態平衡算法。",
            challengeTitle: "挑戰與解決方案",
            challengePoints: "⚡ 電源干擾：加電容+共地。🔧 舵機死區：加大步長。⚖️ 重力安全：角度約束動態限制。",
            specs: "⚙️ 20個舵機 · 🎛️ 6組獨立電源 · 💡 16顆LED · 🎵 MP3模組",
            conclusion: "CreNature實現人機共生 — 機器成為對話夥伴。",
            slides: ["機械樹全貌", "舵機與燈光", "電子艙內部", "按鍵面板", "燈光綻放", "3D列印樹幹"],
            statLabels: { combo: "5按鈕組合", dynamicBalance: "動態平衡", commonGround: "共地+電容", gravityComp: "重力補償", cellophaneRoots: "玻璃紙+氣根" }
        }
    };

    const blogDetails = {
        concept: { en: "## Biomimetic Design & Structural Philosophy\n\nThe tree trunk is 3D printed hollow for cable routing. Four symmetrical robotic arms (branches) each have 5 servos. The lower DS3218 (20kg·cm) supports the entire arm weight. Middle MG996R (10kg·cm) and three SG90 at the top control gripper opening, rotation, and tilt. All cables run inside the trunk to the base. The entire structure mimics natural trees while embedding complex mechatronics.", 
                   zh: "## 仿生設計與結構哲學\n\n樹幹以3D列印空心製作，用於佈線。四組對稱機械臂（樹枝）每組擁有5個舵機。底部DS3218 (20kg·cm) 承載整個機械臂重量，中部MG996R (10kg·cm) 以及頂端三個SG90控制夾爪開合、旋轉與傾斜。所有電線經由樹幹內部通至基座。整體模仿自然樹木，同時嵌入複雜機電。" },
        mechanics: { en: "## Robotic Arms & Torque Management\n\nEach robotic arm has 5 servos: 1x DS3218 (base, 20kg·cm), 1x MG996R (middle, 10kg·cm), 3x SG90 (top, for gripper). The base motor handles the heaviest load. To prevent falling due to gravity, an intelligent safety algorithm limits the mid/upper servos when the base angle is below 70°, forcing them to fold inward. When above 75°, they extend outward to maintain balance. This dynamic compensation ensures stability.", 
                     zh: "## 機械臂與扭力管理\n\n每條機械臂有5個舵機：1個DS3218（底部，20kg·cm）、1個MG996R（中部，10kg·cm）、3個SG90（頂部，控制夾爪）。底部馬達承受最大負載。為防止重力掉落，智能安全邏輯在底部角度低於70°時限制中/上部舵機向內收折，高於75°時強制向外伸展以維持平衡，動態補償確保穩定性。" },
        lighting: { en: "## Lighting & Atmospheric Effects\n\n16 mini LEDs (5V with 330Ω resistors) are wrapped around the four arms, acting as aerial roots. Each LED is covered by colored cellophane flowers (pink, green, yellow, red), creating a stained glow. Three leaf materials: green cellophane, fluorescent origami, and silver craft leaves. The light interacts with these materials to produce iridescent reflections. Glow mode adds extra brightness for a magical aura.", 
                    zh: "## 燈光與氛圍效果\n\n16顆迷你LED（5V串聯330Ω電阻）纏繞在四條機械臂上，作為氣根。每顆LED包裹彩色玻璃紙花朵（粉、綠、黃、紅），產生染色光暈。三種葉片材質：綠色玻璃紙、螢光摺紙、銀色鐵絲葉。燈光與材質交互產生虹彩反射。散光模式增添額外亮度，營造奇幻氛圍。" },
        audio: { en: "## Audio Narrative & MP3 Control\n\nAn independent Arduino Nano controls the MP3 DS Player module via UART. Connected to an 8Ω 0.5W speaker. There are 7 tracks (the 7th is an easter egg). Short press the music button to switch tracks, long press to play (release to stop). Volume set to maximum. This creates an immersive soundscape that responds to user interaction, turning the installation into a storytelling device.", 
                 zh: "## 音樂敘事與MP3控制\n\n獨立的Arduino Nano通過UART控制MP3 DS Player模組，連接8Ω 0.5W喇叭。內置7首曲目（第七首為彩蛋）。短按音樂按鈕切換曲目，長按播放（鬆手停止），音量設為最大。這營造出沉浸式音景，使裝置成為說故事的工具。" },
        control: { en: "## Interactive Logic & Physical Buttons\n\nFive external buttons: Low (base), Mid, High (top), Reset, Music. \n- Long-press Low: base sweeps 55°–90° slowly.\n- Long-press Mid: middle sweeps 70°–120° slowly.\n- Long-press High: top servos move fast (opening/closing).\n- Combinations (e.g., Low+Mid) produce seaweed-like wavy motions.\n- Reset: returns all servos to origin.\nThe dynamic safety algorithm prevents mechanical conflict and cable tangling.", 
                   zh: "## 互動邏輯與實體按鈕\n\n五個外置按鈕：低部、中部、高部、重置、音樂。\n- 長按低部：底部在55°–90°緩慢擺動。\n- 長按中部：中部在70°–120°緩慢擺動。\n- 長按高部：頂部舵機快速開合。\n- 組合（如低+中）產生海草般波浪運動。\n- 重置：所有舵機回到初始角度。\n動態安全算法防止機械衝突與電線纏繞。" },
        challenge: { en: "## Engineering Challenges & Solutions\n\n1. **Power interference**: Charging bricks caused servo jitter → added 0.1µF capacitors across VCC/GND and 1kΩ resistors on signal lines, plus common ground.\n2. **Servo dead zone**: SG90 had erratic motion → increased step size from 1° to 2° and replaced defective units.\n3. **Gravity collapse**: Lower torque insufficient at certain angles → implemented angle-dependent constraint logic to dynamically adjust mid/upper limits.\n4. **Cable management**: All wires routed through hollow trunk and branches, reinforced with soldering and electrical tape.", 
                    zh: "## 工程挑戰與解決方案\n\n1. **電源干擾**：充電寶導致舵機抖動 → 在VCC/GND之間並聯0.1µF電容，信號線串聯1kΩ電阻，並強化共地。\n2. **舵機死區**：SG90動作卡頓 → 加大步長從1°到2°，更換不良舵機。\n3. **重力塌陷**：特定角度底部扭力不足 → 實現角度約束邏輯，動態調整中/上部極限。\n4. **線纜管理**：所有電線經由空心樹幹與樹枝內部，焊接加固並纏繞電工膠布。" }
    };

    let currentLang = "en"; // 預設英文
    let carouselIndex = 0;
    let autoInterval = null;
    let introRendered = false;

    const homePage = document.getElementById('homePage');
    const introPage = document.getElementById('introPage');

    // 動態背景
    function initFloatingDrops() {
        const container = document.getElementById('floatingBg');
        if (!container || container.children.length > 0) return;
        for (let i = 0; i < 24; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            const size = Math.random() * 90 + 30;
            drop.style.width = size + 'px';
            drop.style.height = size + 'px';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.top = Math.random() * 100 + '%';
            drop.style.animation = `floatUpDown ${12 + Math.random() * 10}s infinite ease-in-out`;
            drop.style.animationDelay = Math.random() * 8 + 's';
            drop.style.background = `radial-gradient(circle, rgba(140,180,220,0.2), rgba(80,100,140,0.05))`;
            container.appendChild(drop);
        }
    }

    function renderIntroPage() {
        introRendered = false;
        const t = i18nFull[currentLang];
        const container = document.getElementById('introDynamicContent');
        if (!container) return;
        container.innerHTML = `
            <div class="hero-intro">
                <h1>${t.heroTitle}</h1>
                <p style="font-size:1.2rem; margin-top:12px;">${t.heroSub}</p>
            </div>
            <div class="carousel-section" id="carouselSection">
                <h3 style="text-align:center;">${t.carouselTitle}</h3>
                <div class="carousel-wrapper">
                    <button class="carousel-btn" id="prevSlideBtn">❮</button>
                    <div class="carousel-track-container"><div class="carousel-track" id="carouselTrack"></div></div>
                    <button class="carousel-btn" id="nextSlideBtn">❯</button>
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
            <div class="grid-2col">
                <div class="spec-card" data-blog="concept"><div class="tag">${t.tags.concept}</div><h3>${t.conceptTitle}</h3><p>${t.conceptDetail}</p><div class="stats-row"><span class="stat-badge">20 Servos</span><span class="stat-badge">4 Arms</span></div></div>
                <div class="spec-card" data-blog="mechanics"><div class="tag">${t.tags.mechanics}</div><h3>${t.mechTitle}</h3><p>${t.mechDetail}</p><div class="stats-row"><span class="stat-badge">DS3218 20kg·cm</span><span class="stat-badge">MG996R</span></div></div>
                <div class="spec-card" data-blog="lighting"><div class="tag">${t.tags.lighting}</div><h3>${t.lightTitle}</h3><p>${t.lightDetail}</p><div class="stats-row"><span class="stat-badge">16 LEDs</span><span class="stat-badge">${t.statLabels.cellophaneRoots}</span></div></div>
                <div class="spec-card" data-blog="audio"><div class="tag">${t.tags.audio}</div><h3>${t.audioTitle}</h3><p>${t.audioDetail}</p></div>
                <div class="spec-card" data-blog="control"><div class="tag">${t.tags.control}</div><h3>${t.controlTitle}</h3><p>${t.controlDetail}</p><div class="stats-row"><span class="stat-badge">${t.statLabels.combo}</span><span class="stat-badge">${t.statLabels.dynamicBalance}</span></div></div>
                <div class="spec-card" data-blog="challenge"><div class="tag">${t.tags.challenge}</div><h3>${t.challengeTitle}</h3><p>${t.challengePoints}</p><div class="stats-row"><span class="stat-badge">${t.statLabels.commonGround}</span><span class="stat-badge">${t.statLabels.gravityComp}</span></div></div>
            </div>
            <div class="spec-card" style="text-align:center; background:rgba(0,0,0,0.5);">
                <p style="font-size:1.1rem;">${t.specs}</p>
                <p style="margin-top:1rem; font-style:italic;">✨ ${t.conclusion}</p>
            </div>
        `;
        attachCardEvents();
        buildCarouselDOM(t.slides);
        startAutoScrollCarousel();
        introRendered = true;
    }

    function attachCardEvents() {
        document.querySelectorAll('.spec-card[data-blog]').forEach(card => {
            card.removeEventListener('click', card._clickHandler);
            const handler = (e) => {
                e.stopPropagation();
                const blogKey = card.getAttribute('data-blog');
                showBlogModal(blogKey);
            };
            card.addEventListener('click', handler);
            card._clickHandler = handler;
        });
    }

    function buildCarouselDOM(slideLabels) {
        // ✅ 這裡已修復：1、2、5 改成 .jpg，其他維持 .jpeg
        const galleryImages = ["0002.jpg", "0003.jpeg", "0001.jpg", "0004.jpeg", "0005.jpg", "0006.jpeg"];
        
        const track = document.getElementById('carouselTrack');
        const dotsContainer = document.getElementById('carouselDots');
        if (!track) return;
        track.innerHTML = '';
        galleryImages.forEach((src, idx) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'carousel-slide';
            slideDiv.innerHTML = `<img src="${src}" alt="gallery" onerror="this.src='https://picsum.photos/id/100/900/500'" loading="lazy"><p style="margin-top:12px;">${slideLabels[idx]}</p>`;
            track.appendChild(slideDiv);
        });
        const total = galleryImages.length;
        function updateCarouselUI() {
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            if (dotsContainer) {
                dotsContainer.innerHTML = '';
                for (let i = 0; i < total; i++) {
                    const dot = document.createElement('div');
                    dot.className = `dot ${i === carouselIndex ? 'active' : ''}`;
                    dot.addEventListener('click', () => { carouselIndex = i; updateCarouselUI(); resetAutoScroll(); });
                    dotsContainer.appendChild(dot);
                }
            }
        }
        window.updateCarouselUI = updateCarouselUI;
        const prevBtn = document.getElementById('prevSlideBtn');
        const nextBtn = document.getElementById('nextSlideBtn');
        if (prevBtn) prevBtn.onclick = () => { carouselIndex = (carouselIndex - 1 + total) % total; updateCarouselUI(); resetAutoScroll(); };
        if (nextBtn) nextBtn.onclick = () => { carouselIndex = (carouselIndex + 1) % total; updateCarouselUI(); resetAutoScroll(); };
        updateCarouselUI();
    }

    function startAutoScrollCarousel() { if (autoInterval) clearInterval(autoInterval); autoInterval = setInterval(() => { if (introPage.classList.contains('active-page')) { carouselIndex = (carouselIndex + 1) % 6; if (window.updateCarouselUI) window.updateCarouselUI(); } }, 5000); }
    function resetAutoScroll() { if (autoInterval) { clearInterval(autoInterval); startAutoScrollCarousel(); } }
    function showBlogModal(key) { const modal = document.getElementById('blogModal'); const titleEl = document.getElementById('modalTitle'); const bodyEl = document.getElementById('modalBody'); const detail = blogDetails[key]; if (!detail) return; const content = currentLang === 'en' ? detail.en : detail.zh; const titleMap = { concept: currentLang === 'en' ? "Biomimetic Design" : "仿生設計", mechanics: currentLang === 'en' ? "Robotic Mechanics" : "機械結構", lighting: currentLang === 'en' ? "Lighting & Atmosphere" : "燈光氛圍", audio: currentLang === 'en' ? "Audio Narrative" : "音樂敘事", control: currentLang === 'en' ? "Interactive Logic" : "互動邏輯", challenge: currentLang === 'en' ? "Engineering Challenges" : "工程挑戰" }; titleEl.textContent = titleMap[key] || "Details"; bodyEl.innerHTML = content.replace(/\n/g, '<br>'); modal.style.display = 'flex'; }
    function closeModal() { document.getElementById('blogModal').style.display = 'none'; }

    // 頁面切換
    function setActivePage(page) {
        [homePage, introPage].forEach(p => {
            p.classList.remove('active-page');
            p.style.display = 'none';
        });
        page.classList.add('active-page');
        page.style.display = 'block';
        if (page === introPage) {
            initFloatingDrops();
            renderIntroPage();
            startAutoScrollCarousel();
        }
        if (page === homePage && autoInterval) clearInterval(autoInterval);
    }

    // 按鈕事件
    document.getElementById('enterCameraBtn').onclick = () => {
        window.location.href = "https://monsterlitpow3.github.io/CreNature-Photo/CreNaturePhoto.html";
    };
    document.getElementById('introBtn').onclick = () => setActivePage(introPage);
    document.getElementById('introBackHomeBtn').onclick = () => setActivePage(homePage);
    document.getElementById('globalLangBtn').onclick = () => {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        document.getElementById('globalLangBtn').textContent = currentLang === 'en' ? '中文' : 'English';
        document.getElementById('enterCameraBtn').textContent = currentLang === 'en' ? '📷 Enter Camera' : '📷 進入相機';
        document.getElementById('introBtn').textContent = currentLang === 'en' ? '🌿 Project Intro · CreNature' : '🌿 項目介紹 · CreNature';
        document.getElementById('introBackHomeBtn').textContent = currentLang === 'en' ? '🏠 Back to Home' : '🏠 返回主頁';
        if (introPage.classList.contains('active-page')) renderIntroPage();
    };
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('blogModal').onclick = (e) => { if (e.target === document.getElementById('blogModal')) closeModal(); };

    // 初始化
    setActivePage(homePage);
    initFloatingDrops();

    // 浮動動畫
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes floatUpDown { 0% { transform: translateY(0) scale(1); opacity: 0.2; } 50% { transform: translateY(-50px) scale(1.3); opacity: 0.5; } 100% { transform: translateY(0) scale(1); opacity: 0.2; } }`;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
