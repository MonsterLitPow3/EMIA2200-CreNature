<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 高清相机 & 滑动滤镜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
        }

        body {
            background: #000;
            color: #fff;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #000;
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:active {
            background: white !important;
            color: black !important;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .lang-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            cursor: pointer;
        }
        .lang-btn:active {
            background: white !important;
            color: black !important;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .back-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .back-btn:active {
            background: white !important;
            color: black !important;
        }
        
        /* 拍照按钮 */
        .shutter-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 20px);
            left: calc(50% - 40px);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.25);
            z-index: 10;
            cursor: pointer;
        }
        .shutter-btn:active {
            transform: scale(0.94);
            background: white;
        }
        
        /* 录像按钮 */
        .video-record-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 20px);
            left: calc(50% + 60px);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ff3b30;
            border: 2px solid white;
            z-index: 10;
            cursor: pointer;
        }
        .video-record-btn.recording {
            background: #ffaa00;
            transform: scale(0.92);
        }
        .video-record-btn:active {
            transform: scale(0.94);
        }

        /* 录像计时器 */
        .record-timer {
            position: absolute;
            top: max(70px, env(safe-area-inset-top) + 50px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #ff3b30;
            z-index: 10;
            display: none;
            font-family: monospace;
        }
        .record-timer.show {
            display: block;
        }

        /* 预览页面 */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            padding: 20px;
        }
        
        .preview-img {
            max-width: 90%;
            max-height: 55vh;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            margin-bottom: 20px;
        }
        
        .filter-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            margin: 10px 0;
        }
        .filter-track {
            display: inline-flex;
            gap: 12px;
            padding: 0 20px;
        }
        .filter-item {
            display: inline-flex;
            padding: 10px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-item.active {
            background: rgba(255,255,255,0.35);
            border: 2px solid white;
        }
        
        .glow-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 20px;
            margin: 10px 0;
            cursor: pointer;
        }
        .glow-toggle.active {
            background: rgba(255,255,255,0.25);
            border: 1px solid white;
        }
        
        .preview-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .preview-buttons .btn {
            width: 140px;
            padding: 12px 0;
        }
        
        .preview-wrap .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .processing-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .processing-text {
            color: white;
            font-size: 14px;
        }
        .processing-progress {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        .processing-progress-bar {
            width: 0%;
            height: 100%;
            background: white;
            transition: width 0.2s;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">English</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="enterCameraBtn">📷 进入相机</button>
    <button class="btn" id="introBtn" disabled>📖 项目介绍 (即将开放)</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <div class="record-timer" id="recordTimer">⏺ 0.0s</div>
    <button class="back-btn" id="backHomeBtn">← 返回</button>
    <button class="shutter-btn" id="shutterBtn"></button>
    <button class="video-record-btn" id="videoRecordBtn">🎥</button>
</div>

<!-- 预览页面 -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview" style="display: none;">
    
    <div class="filter-scroll-container" id="filterScroll">
        <div class="filter-track" id="filterTrack"></div>
    </div>
    
    <div class="glow-toggle" id="glowToggle">
        <span>✨</span>
        <span id="glowLabel">散光模式</span>
    </div>
    
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">重新拍摄</button>
        <button class="btn" id="downloadBtn">下载</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">← 返回</button>
</div>

<!-- 处理中遮罩 -->
<div class="processing-overlay" id="processingOverlay">
    <div class="processing-spinner"></div>
    <div class="processing-text" id="processingText">处理中...</div>
    <div class="processing-progress">
        <div class="processing-progress-bar" id="progressBar"></div>
    </div>
</div>

<canvas id="captureCanvas" style="display: none;"></canvas>

<script>
// ==================== 语言配置 ====================
const i18n = {
    en: {
        enterCamera: "📷 Enter Camera",
        intro: "📖 Project Intro (Soon)",
        back: "← Back",
        retake: "Retake",
        download: "Download",
        filters: ["Original", "Soft Mint", "Dusty Pink", "Cool White", "Morandi", "Amber", "Lavender"],
        glow: "Glow Mode",
        processing: "Processing...",
        recording: "REC",
        alertPermission: "Camera permission needed. Please use HTTPS/localhost."
    },
    zh: {
        enterCamera: "📷 进入相机",
        intro: "📖 项目介绍 (即将开放)",
        back: "← 返回",
        retake: "重新拍摄",
        download: "下载",
        filters: ["原色", "浅绿", "浅粉", "冷白", "莫兰迪", "琥珀", "紫罗兰"],
        glow: "散光模式",
        processing: "处理中...",
        recording: "录制中",
        alertPermission: "需要摄像头权限，请使用 HTTPS/localhost 访问"
    }
};

let currentLang = "zh";
let mediaStream = null;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let recordingStartTime = 0;
let recordingTimerInterval = null;

// 预览相关
let originalImageBlob = null;
let currentFilterIndex = 0;
let glowEnabled = false;
let filterItems = [];

// DOM 元素
const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');
const video = document.getElementById('video');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');
const videoRecordBtn = document.getElementById('videoRecordBtn');
const recordTimer = document.getElementById('recordTimer');
const previewImg = document.getElementById('previewImg');
const filterTrack = document.getElementById('filterTrack');
const glowToggle = document.getElementById('glowToggle');
const glowLabel = document.getElementById('glowLabel');
const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');
const processingOverlay = document.getElementById('processingOverlay');
const processingText = document.getElementById('processingText');
const progressBar = document.getElementById('progressBar');
const langToggleBtn = document.getElementById('langToggleBtn');
const introBtn = document.getElementById('introBtn');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');

// ==================== 更新UI文字 ====================
function updateUI() {
    const t = i18n[currentLang];
    enterCameraBtn.textContent = t.enterCamera;
    introBtn.textContent = t.intro;
    backHomeBtn.textContent = t.back;
    backFromPreviewBtn.textContent = t.back;
    reTakeBtn.textContent = t.retake;
    downloadBtn.textContent = t.download;
    glowLabel.textContent = t.glow;
    langToggleBtn.textContent = currentLang === "zh" ? "English" : "中文";
    
    if (filterItems.length > 0) {
        buildFilterUI();
    }
}

// ==================== 获取最高分辨率相机 ====================
async function initCamera() {
    try {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        
        // 优先使用后置摄像头最高分辨率
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        let backCamera = videoDevices.find(d => d.label.toLowerCase().includes('back') || 
                                                   d.label.toLowerCase().includes('rear'));
        
        const constraints = {
            video: {
                deviceId: backCamera ? { exact: backCamera.deviceId } : { facingMode: 'environment' },
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            }
        };
        
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = mediaStream;
        await video.play();
        
        // 获取实际分辨率
        const track = mediaStream.getVideoTracks()[0];
        const settings = track.getSettings();
        console.log("Camera resolution:", settings.width, "x", settings.height);
        
        return true;
    } catch (err) {
        console.error("Camera error:", err);
        alert(i18n[currentLang].alertPermission);
        return false;
    }
}

// ==================== 拍照 ====================
async function takePhoto() {
    if (!video.videoWidth) return;
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    canvas.toBlob(async (blob) => {
        if (blob) {
            originalImageBlob = blob;
            currentFilterIndex = 0;
            glowEnabled = false;
            glowToggle.classList.remove('active');
            await applyFilterToImage();
            
            cameraPage.style.display = 'none';
            previewPage.style.display = 'flex';
        }
    }, 'image/jpeg', 0.95);
}

// ==================== 应用滤镜到图片 ====================
async function applyFilterToImage() {
    if (!originalImageBlob) return;
    
    const img = new Image();
    const url = URL.createObjectURL(originalImageBlob);
    
    return new Promise((resolve) => {
        img.onload = () => {
            const w = img.width, h = img.height;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0);
            
            let imageData = tempCtx.getImageData(0, 0, w, h);
            imageData = applyFilter(imageData, currentFilterIndex);
            
            if (glowEnabled) {
                // 散光效果
                const glowCanvas = document.createElement('canvas');
                glowCanvas.width = w;
                glowCanvas.height = h;
                const glowCtx = glowCanvas.getContext('2d');
                glowCtx.putImageData(imageData, 0, 0);
                glowCtx.filter = 'blur(5px)';
                glowCtx.drawImage(tempCanvas, 0, 0);
                glowCtx.filter = 'none';
                const blurredData = glowCtx.getImageData(0, 0, w, h);
                
                for (let i = 0; i < imageData.data.length; i += 4) {
                    imageData.data[i] = Math.min(255, imageData.data[i] * 0.7 + blurredData.data[i] * 0.5);
                    imageData.data[i+1] = Math.min(255, imageData.data[i+1] * 0.7 + blurredData.data[i+1] * 0.5);
                    imageData.data[i+2] = Math.min(255, imageData.data[i+2] * 0.7 + blurredData.data[i+2] * 0.5);
                }
            }
            
            tempCtx.putImageData(imageData, 0, 0);
            tempCanvas.toBlob((blob) => {
                if (blob) {
                    const previewUrl = URL.createObjectURL(blob);
                    previewImg.src = previewUrl;
                    previewImg.style.display = 'block';
                }
                URL.revokeObjectURL(url);
                resolve();
            }, 'image/jpeg', 0.92);
        };
        img.src = url;
    });
}

function applyFilter(imageData, index) {
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        
        switch(index) {
            case 1: // 浅绿
                g = Math.min(255, g * 1.35);
                r = r * 0.75;
                b = b * 0.7;
                break;
            case 2: // 浅粉
                r = Math.min(255, r * 1.3 + 15);
                g = g * 0.8;
                b = b * 0.85;
                break;
            case 3: // 冷白
                let gray = (r + g + b) / 3;
                r = Math.min(255, (r * 0.9 + gray * 0.3) * 1.15);
                g = Math.min(255, (g * 0.95 + gray * 0.25) * 1.15);
                b = Math.min(255, (b * 1.1 + gray * 0.2) * 1.15);
                break;
            case 4: // 莫兰迪
                let gray2 = 0.299 * r + 0.587 * g + 0.114 * b;
                let sat = 0.6;
                r = Math.min(255, r * sat + gray2 * (1 - sat) * 0.95);
                g = Math.min(255, g * sat + gray2 * (1 - sat) * 0.95);
                b = Math.min(255, b * sat + gray2 * (1 - sat) * 0.95 + 10);
                break;
            case 5: // 琥珀
                r = Math.min(255, r * 1.2 + 18);
                g = Math.min(255, g * 0.92 + 10);
                b = b * 0.65;
                break;
            case 6: // 紫罗兰
                r = Math.min(255, r * 0.92 + b * 0.3);
                g = g * 0.75;
                b = Math.min(255, b * 1.2 + 22);
                break;
            default: break;
        }
        
        data[i] = r;
        data[i+1] = g;
        data[i+2] = b;
    }
    return imageData;
}

// ==================== 录像功能 ====================
async function startRecording() {
    if (!mediaStream) return;
    
    recordedChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
    
    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };
    
    mediaRecorder.onstop = async () => {
        const videoBlob = new Blob(recordedChunks, { type: 'video/mp4' });
        originalImageBlob = videoBlob;
        
        // 模拟视频处理（实际项目可扩展视频滤镜）
        const url = URL.createObjectURL(videoBlob);
        previewImg.src = url;
        previewImg.style.display = 'block';
        
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
        
        stopRecordingTimer();
    };
    
    mediaRecorder.start();
    isRecording = true;
    videoRecordBtn.classList.add('recording');
    recordingStartTime = Date.now();
    startRecordingTimer();
    
    // 3秒后自动停止
    setTimeout(() => {
        if (isRecording) stopRecording();
    }, 3000);
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        videoRecordBtn.classList.remove('recording');
        stopRecordingTimer();
    }
}

function startRecordingTimer() {
    if (recordingTimerInterval) clearInterval(recordingTimerInterval);
    recordingTimerInterval = setInterval(() => {
        if (isRecording) {
            const elapsed = (Date.now() - recordingStartTime) / 1000;
            recordTimer.textContent = `⏺ ${elapsed.toFixed(1)}s / 3.0s`;
            recordTimer.classList.add('show');
            if (elapsed >= 3.0) stopRecording();
        }
    }, 100);
}

function stopRecordingTimer() {
    if (recordingTimerInterval) {
        clearInterval(recordingTimerInterval);
        recordingTimerInterval = null;
    }
    recordTimer.classList.remove('show');
}

// ==================== 滤镜UI ====================
function buildFilterUI() {
    const filters = i18n[currentLang].filters;
    filterTrack.innerHTML = '';
    filterItems = [];
    
    filters.forEach((name, idx) => {
        const div = document.createElement('div');
        div.className = 'filter-item';
        if (idx === currentFilterIndex) div.classList.add('active');
        div.textContent = name;
        div.onclick = () => {
            currentFilterIndex = idx;
            filterItems.forEach((item, i) => {
                if (i === idx) item.classList.add('active');
                else item.classList.remove('active');
            });
            applyFilterToImage();
        };
        filterTrack.appendChild(div);
        filterItems.push(div);
    });
}

// ==================== 页面切换 ====================
async function goToCamera() {
    const success = await initCamera();
    if (success) {
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    }
}

function goToHome() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (isRecording) stopRecording();
    cameraPage.style.display = 'none';
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
}

function backToCamera() {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    originalImageBlob = null;
}

// ==================== 下载 ====================
function downloadPhoto() {
    if (previewImg.src && previewImg.src.startsWith('blob:')) {
        const a = document.createElement('a');
        a.href = previewImg.src;
        a.download = `CreNature_${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

// ==================== 语言切换 ====================
function toggleLang() {
    currentLang = currentLang === "zh" ? "en" : "zh";
    updateUI();
}

// ==================== 事件绑定 ====================
enterCameraBtn.onclick = goToCamera;
backHomeBtn.onclick = goToHome;
backFromPreviewBtn.onclick = backToCamera;
shutterBtn.onclick = takePhoto;
videoRecordBtn.onclick = () => {
    if (isRecording) stopRecording();
    else startRecording();
};
reTakeBtn.onclick = backToCamera;
downloadBtn.onclick = downloadPhoto;
langToggleBtn.onclick = toggleLang;

glowToggle.onclick = () => {
    glowEnabled = !glowEnabled;
    if (glowEnabled) glowToggle.classList.add('active');
    else glowToggle.classList.remove('active');
    applyFilterToImage();
};

// ==================== 初始化 ====================
updateUI();
buildFilterUI();
homePage.style.display = 'flex';
cameraPage.style.display = 'none';
previewPage.style.display = 'none';
</script>
</body>
</html>
