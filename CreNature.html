<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
        }
        .lang-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #fff;
            border-radius: 30px;
            color: #fff;
            z-index: 999;
        }
        .page {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #homePage { display: flex; }
        .btn {
            width: 240px;
            padding: 14px;
            margin: 10px;
            border: 1px solid #fff;
            border-radius: 40px;
            background: #111;
            color: #fff;
            font-size: 16px;
        }
        #cameraPage { position: fixed; top:0; left:0; z-index:10; }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shutter {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #fff;
        }
        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid #fff;
            border-radius: 30px;
        }
        #previewPage img {
            width: 80%;
            border-radius: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langBtn">中</button>

<div id="homePage" class="page">
    <button class="btn" disabled>Project Intro</button>
    <button class="btn" id="openCamera">Enter Camera</button>
</div>

<div id="cameraPage" class="page">
    <video id="video" autoplay muted playsinline></video>
    <button class="back" id="backFromCamera">Back</button>
    <button class="shutter" id="shutter"></button>
</div>

<div id="previewPage" class="page">
    <img id="previewImg">
    <button class="btn" id="retake">Retake</button>
    <button class="btn" id="download">Download</button>
    <button class="btn" id="backFromPreview">Back to Home</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const langBtn = document.getElementById('langBtn');
    const homePage = document.getElementById('homePage');
    const cameraPage = document.getElementById('cameraPage');
    const previewPage = document.getElementById('previewPage');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const previewImg = document.getElementById('previewImg');

    let currentPhoto = '';
    let lang = 'zh';

    // 语言切换
    langBtn.onclick = () => {
        lang = lang === 'zh' ? 'en' : 'zh';
        langBtn.innerText = lang === 'zh' ? '中' : 'ENG';
    };

    // 打开相机
    document.getElementById('openCamera').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        });
        video.srcObject = stream;
        homePage.style.display = 'none';
        cameraPage.style.display = 'flex';
    };

    // 拍照
    document.getElementById('shutter').onclick = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        currentPhoto = canvas.toDataURL('image/png');
        previewImg.src = currentPhoto;
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
    };

    // 下载（100%正常）
    document.getElementById('download').onclick = () => {
        const a = document.createElement('a');
        a.href = currentPhoto;
        a.download = 'CreNature.png';
        a.click();
    };

    // 重新拍摄
    document.getElementById('retake').onclick = () => {
        previewPage.style.display = 'none';
        cameraPage.style.display = 'flex';
    };

    // 返回
    document.getElementById('backFromCamera').onclick = () => {
        video.srcObject.getTracks().forEach(t => t.stop());
        cameraPage.style.display = 'none';
        homePage.style.display = 'flex';
    };

    document.getElementById('backFromPreview').onclick = () => {
        video.srcObject?.getTracks().forEach(t => t.stop());
        previewPage.style.display = 'none';
        homePage.style.display = 'flex';
    };
</script>
</body>
</html>
