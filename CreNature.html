<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature - 高清相机 & 氛围滤镜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 全局按钮按下的白底黑字特效 */
        .lang-btn:active,
        .btn:active,
        .back-btn:active,
        .shutter-btn:active,
        .filter-arrow:active {
            background: white !important;
            color: black !important;
            border-color: white !important;
        }
        .shutter-btn:active {
            transform: translateX(-50%) scale(0.94);
        }

        /* 语言切换按钮 */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }

        /* 首页 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
        }

        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.08s linear;
        }
        
        /* 快门按钮 - 显著上移，避开底部应用栏 */
        .shutter-btn {
            position: absolute;
            bottom: max(140px, calc(env(safe-area-inset-bottom) + 100px));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.2);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.08s linear;
        }

        /* ========= 预览页面 - 新增滤镜滑动条 ========= */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow-y: auto;
            padding: 0 20px;
            padding-top: max(70px, env(safe-area-inset-top) + 20px);
            padding-bottom: max(70px, calc(env(safe-area-inset-bottom) + 85px));
            box-sizing: border-box;
        }
        
        .preview-img {
            max-width: 90%;
            max-height: 45vh;
            width: auto;
            height: auto;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin-bottom: 20px;
        }
        
        /* 滤镜滑动控件 */
        .filter-slider {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px 12px;
            width: 85%;
            margin: 12px 0 20px;
            border: 0.5px solid rgba(255,255,255,0.2);
        }
        .filter-arrow {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.08s linear;
            color: white;
        }
        .filter-name {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
            margin: 0;
        }
        
        .preview-buttons .btn {
            width: 240px;
        }
        
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }
        
        @media (max-width: 480px) and (max-height: 700px) {
            .preview-img {
                max-height: 38vh;
                margin-bottom: 12px;
            }
            .filter-slider {
                width: 92%;
                margin: 8px 0 16px;
            }
            .preview-buttons {
                gap: 12px;
            }
        }
        
        @media (max-height: 600px) {
            .preview-img {
                max-height: 35vh;
            }
            .filter-arrow {
                width: 38px;
                height: 38px;
                font-size: 22px;
            }
        }

        #captureCanvas {
            display: none;
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 预览页面（含滤镜滑动条） -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    
    <!-- 滤镜滑动控件 -->
    <div class="filter-slider">
        <div class="filter-arrow" id="prevFilterBtn">◀</div>
        <div class="filter-name" id="filterNameLabel">原色 · 无滤镜</div>
        <div class="filter-arrow" id="nextFilterBtn">▶</div>
    </div>
    
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost",
        hdAlert: "High-resolution mode activated",
        filters: ["Original", "Soft Mint", "Dusty Pink", "Cool White", "Morandi", "Amber Glow", "Lavender Haze"]
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开",
        hdAlert: "已开启最高分辨率模式",
        filters: ["原色", "浅绿散光", "浅粉散光", "柔白冷调", "莫兰迪", "琥珀暖光", "紫罗兰雾"]
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');
const filterNameLabel = document.getElementById('filterNameLabel');
const prevFilterBtn = document.getElementById('prevFilterBtn');
const nextFilterBtn = document.getElementById('nextFilterBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let capturedBlobUrl = null;         // 当前显示的图片（已应用滤镜）的blob URL
let originalImageBlob = null;       // 原始拍照图片的blob（未加滤镜）
let originalImageElement = null;    // 原始图片HTMLImageElement，用于重绘滤镜
let currentFilterIndex = 0;         // 0: 原色, 1:浅绿,2:浅粉,3:柔白,4:莫兰迪,5:琥珀,6:紫罗兰
let isFilterReady = false;

// ---------- 七款滤镜算法 (基于 ImageData 像素级处理，B站同款色盲艺术风格) ----------

// 滤镜1: 浅绿散光 (柔和绿调，提升绿通道，压低红蓝)
function applyLightGreenFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        let newG = Math.min(255, g * 1.32);
        let newR = r * 0.78;
        let newB = b * 0.72;
        data[i] = newR;
        data[i+1] = newG;
        data[i+2] = newB;
    }
    return imgData;
}

// 滤镜2: 浅粉散光 (粉调柔光)
function applyLightPinkFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        data[i] = Math.min(255, r * 1.28 + 18);
        data[i+1] = g * 0.82;
        data[i+2] = b * 0.86;
    }
    return imgData;
}

// 滤镜3: 柔白冷调 (清冷透亮)
function applyCoolWhiteFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        let gray = (r + g + b) / 3;
        let factor = 1.18;
        let newR = Math.min(255, (r * 0.92 + gray * 0.35) * factor);
        let newG = Math.min(255, (g * 1.0 + gray * 0.28) * factor);
        let newB = Math.min(255, (b * 1.12 + gray * 0.2) * factor);
        data[i] = newR;
        data[i+1] = newG;
        data[i+2] = newB;
    }
    return imgData;
}

// 滤镜4: 莫兰迪低饱和 (高级灰)
function applyMorandiFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        let sat = 0.62;
        data[i] = r * sat + gray * (1 - sat);
        data[i+1] = g * sat + gray * (1 - sat);
        data[i+2] = b * sat + gray * (1 - sat);
        // 轻微提亮柔和
        data[i] = Math.min(255, data[i] * 0.96 + 8);
        data[i+1] = Math.min(255, data[i+1] * 0.96 + 8);
        data[i+2] = Math.min(255, data[i+2] * 0.96 + 12);
    }
    return imgData;
}

// 滤镜5: 琥珀暖光 (将暖色强化，类似日落)
function applyAmberFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        data[i] = Math.min(255, r * 1.22 + 22);
        data[i+1] = Math.min(255, g * 0.94 + 12);
        data[i+2] = b * 0.68;
    }
    return imgData;
}

// 滤镜6: 紫罗兰雾 (梦幻淡紫)
function applyVioletFilter(imgData) {
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];
        data[i] = Math.min(255, r * 0.94 + b * 0.28);
        data[i+1] = g * 0.78;
        data[i+2] = Math.min(255, b * 1.18 + 25);
    }
    return imgData;
}

// 滤镜0: 原色 (不做任何修改)
function applyOriginalFilter(imgData) {
    return imgData;
}

// 根据索引获取滤镜函数
function getFilterByIndex(index) {
    switch(index) {
        case 0: return applyOriginalFilter;
        case 1: return applyLightGreenFilter;
        case 2: return applyLightPinkFilter;
        case 3: return applyCoolWhiteFilter;
        case 4: return applyMorandiFilter;
        case 5: return applyAmberFilter;
        case 6: return applyVioletFilter;
        default: return applyOriginalFilter;
    }
}

// 核心：将原始图片元素 + 滤镜索引 -> 生成新的blob URL，并更新预览图
async function applyFilterAndUpdate(filterIndex) {
    if (!originalImageElement || !originalImageElement.complete || originalImageElement.naturalWidth === 0) {
        return false;
    }
    const img = originalImageElement;
    const width = img.naturalWidth;
    const height = img.naturalHeight;
    
    // 使用离屏canvas处理滤镜
    const offCanvas = document.createElement('canvas');
    offCanvas.width = width;
    offCanvas.height = height;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(img, 0, 0, width, height);
    let imageData = offCtx.getImageData(0, 0, width, height);
    const filterFunc = getFilterByIndex(filterIndex);
    imageData = filterFunc(imageData);
    offCtx.putImageData(imageData, 0, 0);
    
    return new Promise((resolve) => {
        offCanvas.toBlob((blob) => {
            if (blob) {
                const newUrl = URL.createObjectURL(blob);
                // 释放旧的URL避免内存泄漏
                if (capturedBlobUrl && capturedBlobUrl !== newUrl) {
                    URL.revokeObjectURL(capturedBlobUrl);
                }
                capturedBlobUrl = newUrl;
                previewImg.src = newUrl;
                resolve(true);
            } else {
                resolve(false);
            }
        }, 'image/png');
    });
}

// 更新滤镜名称文本（根据当前语言）
function updateFilterNameLabel() {
    const filterNames = i18n[currentLang].filters;
    filterNameLabel.textContent = filterNames[currentFilterIndex] || filterNames[0];
}

// 切换滤镜 (左侧/右侧)
async function changeFilter(delta) {
    if (!originalImageElement) return;
    let newIndex = currentFilterIndex + delta;
    if (newIndex < 0) newIndex = 6;
    if (newIndex > 6) newIndex = 0;
    currentFilterIndex = newIndex;
    updateFilterNameLabel();
    await applyFilterAndUpdate(currentFilterIndex);
}

// 初始化预览页面，设置原始图片 (传入原始图片blob)
async function initPreviewWithOriginal(originalBlob) {
    if (originalImageBlob) {
        URL.revokeObjectURL(originalImageBlob);
    }
    originalImageBlob = originalBlob;
    // 创建img元素加载原始图片
    const img = new Image();
    const originalUrl = URL.createObjectURL(originalBlob);
    img.onload = async () => {
        originalImageElement = img;
        currentFilterIndex = 0;   // 重置滤镜为原色
        updateFilterNameLabel();
        await applyFilterAndUpdate(0);
        isFilterReady = true;
        URL.revokeObjectURL(originalUrl); // 释放临时url，已经有了originalImageElement保留数据
    };
    img.src = originalUrl;
}

// ---------- 相机 / 拍照逻辑 (保留原有最高分辨率) ----------
async function getMaxResolutionStream() {
    let tempStream = null;
    try {
        tempStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 4096 },
                height: { ideal: 2160 }
            },
            audio: false
        });
    } catch (err) {
        tempStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false
        });
    }
    const track = tempStream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    if (capabilities.width && capabilities.width.max) {
        const maxWidth = capabilities.width.max;
        const maxHeight = capabilities.height?.max || 2160;
        try {
            await track.applyConstraints({
                width: { exact: maxWidth },
                height: { exact: maxHeight }
            });
        } catch (e) {
            await track.applyConstraints({
                width: { ideal: maxWidth },
                height: { ideal: maxHeight }
            });
        }
    }
    return tempStream;
}

enterCameraBtn.addEventListener('click', async () => {
    try {
        mediaStream = await getMaxResolutionStream();
        video.srcObject = mediaStream;
        await new Promise((resolve) => {
            if (video.readyState >= 2) resolve();
            else video.onloadeddata = () => resolve();
        });
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch (err) {
        alert(i18n[currentLang].alertPermission);
    }
});

// 拍照：捕获当前视频帧（无滤镜的原始高分辨率帧）
async function capturePhoto() {
    if (!video.videoWidth || !video.videoHeight) return false;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    return new Promise((resolve) => {
        canvas.toBlob(async (blob) => {
            if (blob) {
                // 重置滤镜相关变量
                if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
                if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
                // 存储原始图片blob，并初始化预览页面
                await initPreviewWithOriginal(blob);
                resolve(true);
            } else {
                resolve(false);
            }
        }, 'image/png');
    });
}

shutterBtn.addEventListener('click', async () => {
    if (!video.videoWidth || !video.videoHeight) {
        await new Promise(r => setTimeout(r, 100));
        if (!video.videoWidth) return;
    }
    const success = await capturePhoto();
    if (success) {
        cameraPage.style.display = 'none';
        previewPage.style.display = 'flex';
    }
});

// 重拍：清除滤镜数据，返回相机
reTakeBtn.addEventListener('click', () => {
    // 清理资源
    if (originalImageBlob) { URL.revokeObjectURL(originalImageBlob); originalImageBlob = null; }
    if (capturedBlobUrl) { URL.revokeObjectURL(capturedBlobUrl); capturedBlobUrl = null; }
    originalImageElement = null;
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    if (mediaStream && mediaStream.active && video.srcObject) {
        video.play().catch(e => console.warn);
    }
});

// 下载功能：下载当前预览图片（已应用滤镜）
function triggerDownload(url, filename) {
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 200);
}

downloadBtn.addEventListener('click', () => {
    if (capturedBlobUrl) {
        triggerDownload(capturedBlobUrl, `CreNature_${Date.now()}.png`);
    } else {
        alert("No photo available");
    }
});

// 返回首页 (相机页)
backHomeBtn.addEventListener('click', () => {
    stopCamera();
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 预览页返回首页
backFromPreviewBtn.addEventListener('click', () => {
    stopCamera();
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
    capturedBlobUrl = null;
    originalImageBlob = null;
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
});

function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (video.srcObject) video.srcObject = null;
}

// 语言切换 + 更新滤镜显示名称
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
    // 更新滤镜名称
    updateFilterNameLabel();
}

langToggleBtn.addEventListener('click', () => {
    updateLanguage(currentLang === "en" ? "zh" : "en");
});

// 绑定滤镜左右滑动事件
prevFilterBtn.addEventListener('click', () => changeFilter(-1));
nextFilterBtn.addEventListener('click', () => changeFilter(1));

// 页面卸载清理
window.addEventListener('beforeunload', () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (capturedBlobUrl) URL.revokeObjectURL(capturedBlobUrl);
    if (originalImageBlob) URL.revokeObjectURL(originalImageBlob);
});

updateLanguage('en');
</script>
