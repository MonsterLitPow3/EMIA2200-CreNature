<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            /* 禁止选中 / 禁止长按复制 */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            /* 完全锁死，不滑动、不被遮挡 */
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 语言切换按钮（全局右上角） */
        .lang-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            right: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 999;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }

        /* 首页 - 增强底部安全区域，防止应用栏遮挡下方内容 */
        .home-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            /* 避免底部系统栏（应用栏）遮挡按钮区域，增加安全区填充 */
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
            transition: 0.2s;
            cursor: pointer;
        }
        .btn:active {
            background: rgba(255,255,255,0.1);
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 相机页面 */
        .camera-wrap {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .back-btn {
            position: absolute;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }
        
        /* 修复快门按钮被底部应用栏遮挡的问题：
           增大底部间距，并基于安全区动态调整，确保在任何设备上都不被遮挡 */
        .shutter-btn {
            position: absolute;
            bottom: max(90px, calc(env(safe-area-inset-bottom) + 55px));
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
            z-index: 10;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.1s ease;
        }
        .shutter-btn:active {
            background: rgba(255,255,255,0.3);
            transform: translateX(-50%) scale(0.96);
        }

        /* 预览照片页面 —— 增加滚动能力 + 底部安全区填充，彻底避免应用栏遮挡下方按钮 */
        .preview-wrap {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: max(80px, env(safe-area-inset-top) + 20px);
            /* 底部留出足够空间，防止系统应用栏遮挡按钮区域 */
            padding-bottom: max(40px, calc(env(safe-area-inset-bottom) + 35px));
            gap: 30px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #000;
            position: relative;
        }
        .preview-img {
            width: 75%;
            max-width: 380px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            object-fit: contain;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }
        .preview-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
            /* 额外的底部余量保证按钮不贴地 */
            margin-bottom: 10px;
        }
        
        /* 预览页内部的返回按钮（左上角保持绝对定位） */
        .preview-wrap .back-btn {
            position: fixed;
            top: max(30px, env(safe-area-inset-top) + 10px);
            left: 20px;
            z-index: 20;
        }
        
        /* 解决预览页面按钮间距以及最底部留白 */
        .preview-buttons .btn {
            width: 220px;
        }

        #captureCanvas {
            display: none;
        }
        
        /* 适配极窄屏幕时，让预览图片稍小一点保持舒适 */
        @media (max-width: 480px) {
            .preview-img {
                width: 85%;
            }
            .shutter-btn {
                width: 64px;
                height: 64px;
                bottom: max(85px, calc(env(safe-area-inset-bottom) + 50px));
            }
        }
    </style>
</head>
<body>

<button class="lang-btn" id="langToggleBtn">ENG</button>

<!-- 首页 -->
<div class="home-wrap" id="homePage">
    <button class="btn" id="introBtn" disabled>Project Introduction (Coming Soon)</button>
    <button class="btn" id="enterCameraBtn">Enter Camera Mode</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <button class="back-btn" id="backHomeBtn">Back</button>
    <button class="shutter-btn" id="shutterBtn"></button>
</div>

<!-- 照片预览页面 -->
<div class="preview-wrap" id="previewPage">
    <img class="preview-img" id="previewImg" alt="Preview Photo">
    <div class="preview-buttons">
        <button class="btn" id="reTakeBtn">Retake Photo</button>
        <button class="btn" id="downloadBtn">Download Photo</button>
    </div>
    <button class="back-btn" id="backFromPreviewBtn">Back</button>
</div>

<canvas id="captureCanvas"></canvas>

<script>
const i18n = {
    en: {
        introBtn: "Project Introduction (Coming Soon)",
        enterCameraBtn: "Enter Camera Mode",
        backBtn: "Back",
        reTakeBtn: "Retake Photo",
        downloadBtn: "Download Photo",
        alertPermission: "Please allow camera permission and open with HTTPS/localhost"
    },
    zh: {
        introBtn: "项目简介模式（暂未开放）",
        enterCameraBtn: "进入拍照模式",
        backBtn: "返回",
        reTakeBtn: "重新拍照",
        downloadBtn: "下载照片",
        alertPermission: "请允许摄像头权限，并使用HTTPS/localhost打开"
    }
};

let currentLang = "en";

const homePage = document.getElementById('homePage');
const cameraPage = document.getElementById('cameraPage');
const previewPage = document.getElementById('previewPage');

const introBtn = document.getElementById('introBtn');
const enterCameraBtn = document.getElementById('enterCameraBtn');
const backHomeBtn = document.getElementById('backHomeBtn');
const shutterBtn = document.getElementById('shutterBtn');

const reTakeBtn = document.getElementById('reTakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const backFromPreviewBtn = document.getElementById('backFromPreviewBtn');

const langToggleBtn = document.getElementById('langToggleBtn');

const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');
const previewImg = document.getElementById('previewImg');

let mediaStream = null;
let captureUrl = '';

// 语言切换
function updateLanguage(lang) {
    currentLang = lang;
    const texts = i18n[lang];
    langToggleBtn.textContent = lang === "en" ? "中" : "ENG";
    introBtn.textContent = texts.introBtn;
    enterCameraBtn.textContent = texts.enterCameraBtn;
    backHomeBtn.textContent = texts.backBtn;
    reTakeBtn.textContent = texts.reTakeBtn;
    downloadBtn.textContent = texts.downloadBtn;
    backFromPreviewBtn.textContent = texts.backBtn;
}

langToggleBtn.addEventListener('click', () => {
    updateLanguage(currentLang === "en" ? "zh" : "en");
});

// 进入相机
enterCameraBtn.addEventListener('click', async () => {
    try {
        // 请求后置摄像头，最高清晰度
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 3840 },
                height: { ideal: 2160 }
            },
            audio: false
        });
        video.srcObject = mediaStream;
        // 确保视频元数据加载后更新画布尺寸备用
        await new Promise((resolve) => {
            if (video.readyState >= 2) {
                resolve();
            } else {
                video.onloadeddata = () => resolve();
            }
        });
        homePage.style.display = 'none';
        cameraPage.style.display = 'block';
    } catch (err) {
        console.warn(err);
        alert(i18n[currentLang].alertPermission);
    }
});

// 拍照
shutterBtn.addEventListener('click', () => {
    if (!video.videoWidth || !video.videoHeight) {
        // 若视频流未就绪，简单重试等待一帧
        if (video.readyState < 2) return;
    }
    // 设置画布大小为视频实际尺寸
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    captureUrl = canvas.toDataURL('image/png');

    previewImg.src = captureUrl;
    cameraPage.style.display = 'none';
    previewPage.style.display = 'flex';
    // 预览页面滚动到顶部，避免按钮位于不可见区域
    previewPage.scrollTop = 0;
});

// 重拍
reTakeBtn.addEventListener('click', () => {
    previewPage.style.display = 'none';
    cameraPage.style.display = 'block';
    // 确保视频流还在播放
    if (mediaStream && mediaStream.active && video.srcObject) {
        video.play().catch(e => console.warn);
    }
});

// 下载照片 —— 兼容所有现代浏览器和手机
downloadBtn.addEventListener('click', () => {
    if (!captureUrl) return;
    
    const link = document.createElement('a');
    link.href = captureUrl;
    link.download = `CreNature_${Date.now()}.png`;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => {
        document.body.removeChild(link);
    }, 120);
});

// 返回首页（从相机页）
backHomeBtn.addEventListener('click', () => {
    stopCamera();
    cameraPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 从预览页返回首页（释放相机资源并回首页）
backFromPreviewBtn.addEventListener('click', () => {
    stopCamera();
    previewPage.style.display = 'none';
    homePage.style.display = 'flex';
});

// 统一停止相机，释放资源
function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    if (video.srcObject) {
        video.srcObject = null;
    }
}

// 页面卸载时确保释放相机资源（可选）
window.addEventListener('beforeunload', () => {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
    }
});

// 初始化语言英文
updateLanguage('en');

// 额外保障：针对某些浏览器或移动端，预览页面滚动时不受任何底部遮挡干扰
// 同时，如果用户从预览返回相机时确保视频流重新播放顺畅
// 已在重拍和相机进入逻辑中保障

// 如果由于安全区env不支持导致底部依然有遮挡，额外监听resize动态调整? 不需要，CSS已经确保底部有可靠间距
// 同时修正相机快门区域点击区域完全避开系统栏
</script>
</body>
</html>
