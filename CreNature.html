<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：手机适配、允许摄像头、禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CreNature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 首页容器 */
        .home-wrap {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        /* 全局按钮样式 */
        .btn {
            width: 220px;
            padding: 16px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(6px);
        }
        .btn:disabled {
            opacity: 0.35;
        }

        /* 相机页面 默认隐藏 */
        .camera-wrap {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back-btn {
            position: absolute;
            top: 40px;
            left: 20px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 首页 两个按钮 -->
<div class="home-wrap" id="homePage">
    <button class="btn" disabled>项目简介模式（暂未开放）</button>
    <button class="btn" id="enterCameraBtn">进入拍照模式</button>
</div>

<!-- 相机页面 -->
<div class="camera-wrap" id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <div class="back-btn" id="backHomeBtn">返回</div>
</div>

<script>
    // 页面元素
    const homePage = document.getElementById('homePage');
    const cameraPage = document.getElementById('cameraPage');
    const enterCameraBtn = document.getElementById('enterCameraBtn');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const video = document.getElementById('video');

    let mediaStream = null;

    // 进入拍照模式：申请摄像头权限 + 打开后置相机
    enterCameraBtn.addEventListener('click', async () => {
        try {
            // 固定调用后置摄像头，兼容 iOS / Android
            mediaStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment'
                },
                audio: false
            });

            // 把摄像头流绑定到video标签
            video.srcObject = mediaStream;

            // 切换页面显示
            homePage.style.display = 'none';
            cameraPage.style.display = 'block';

        } catch (err) {
            alert('无法获取摄像头权限，请在设置允许浏览器使用摄像头，并使用HTTPS/localhost打开');
            console.error('摄像头权限错误：', err);
        }
    });

    // 返回首页，关闭摄像头
    backHomeBtn.addEventListener('click', () => {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        cameraPage.style.display = 'none';
        homePage.style.display = 'flex';
    });
</script>

</body>
</html>
